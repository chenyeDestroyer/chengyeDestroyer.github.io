      '<button class="delete-btn" onclick="event.stopPropagation();deleteCardFromCabinet(\'' + mat.id + '\')">×</button>' +
      '<div class="card-accent"></div>' +
      '<div class="card-icon">' + getMaterialIcon(mat.type) + '</div>' +
      '<div class="card-name" title="' + mat.name + '">' + mat.name + '</div>' +
      '<div class="card-meta"><span>' + new Date(mat.createdAt).toLocaleDateString('zh-CN') + '</span>' +
      (mat.pageCount ? '<span>' + mat.pageCount + 'p</span>' : '') + '</div>' +
      '<div class="card-type">' + getMaterialTypeLabel(mat.type) + '</div>';
    area.appendChild(card);
  });
}

function renderSidebar() {
  const list = document.getElementById('sidebarList');
  if (materials.length === 0) {
    list.innerHTML = '<li style="padding:16px;text-align:center;opacity:0.35;font-size:11px">No Materials</li>';
  } else {
    const activeId = currentViewerMaterial ? currentViewerMaterial.id : null;
    list.innerHTML = materials.map(mat =>
      '<li class="sidebar-item ' + (mat.id === activeId ? 'active' : '') + '" onclick="openMaterial(\'' + mat.id + '\')" title="' + mat.name + '">' +
      '<span class="item-icon">' + getMaterialIcon(mat.type) + '</span>' +
      '<span style="overflow:hidden;text-overflow:ellipsis">' + mat.name + '</span>' +
      (mat.notes && Object.keys(mat.notes).length > 0 ? '<span class="item-badge">' + Object.keys(mat.notes).length + '</span>' : '') +
      '</li>'
    ).join('');
  }
}

function updateSidebarActive(matId) {
  document.querySelectorAll('#sidebarList .sidebar-item').forEach(item => item.classList.remove('active'));
  const items = document.querySelectorAll('#sidebarList .sidebar-item');
  const idx = materials.findIndex(m => m.id === matId);
  if (idx >= 0 && items[idx]) items[idx].classList.add('active');
}

function updateTrashBadge() {
  const item = document.getElementById('trashSidebarItem');
  const count = document.getElementById('trashCount');
  if (trash.length > 0) { item.style.display = ''; count.textContent = trash.length; }
  else { item.style.display = 'none'; }
}

/* ========== Note Panel ========== */
window.toggleNotePanel = function() {
  if (notePanelOpen) {
    if (noteCanvas && currentViewerMaterial) savedNoteImages[currentNotePage] = noteCanvas.toDataURL();
    notePanelOpen = false;
    document.getElementById('notePanel').classList.add('hidden');
    document.getElementById('notePanel').innerHTML = '';
  } else {
    notePanelOpen = true;
    currentNotePage = viewerCurrentPage;
    openNotePanel(currentNotePage);
  }
};

function openNotePanel(pageNum) {
  const panel = document.getElementById('notePanel');
  panel.classList.remove('hidden');
  const mat = currentViewerMaterial;
  if (!mat) return;
  panel.innerHTML =
    '<div class="note-panel-header">' +
    '<h4>Notes - Page ' + pageNum + '</h4>' +
    '<button class="close-btn" onclick="document.getElementById(\'notePanel\').classList.add(\'hidden\'); notePanelOpen = false;">✕</button>' +
    '</div>' +
    '<div class="note-mode-select">' +
    '<div class="note-mode-btn ' + (noteMode === 'handwrite' ? 'active' : '') + '" onclick="setNoteMode(\'handwrite\')">✎ Handwrite</div>' +
    '<div class="note-mode-btn ' + (noteMode === 'import' ? 'active' : '') + '" onclick="setNoteMode(\'import\')">⇧ Import</div>' +
    '</div>' +
    '<div id="noteContentArea" style="flex:1;display:flex;flex-direction:column;overflow:hidden;"></div>';
  renderNoteContent(pageNum);
}

window.setNoteMode = function(mode) { noteMode = mode; renderNoteContent(currentNotePage); };

function renderNoteContent(pageNum) {
  const area = document.getElementById('noteContentArea');
  if (!area) return;
  if (noteMode === 'handwrite') {
    area.innerHTML =
      '<div class="note-colors">' +
      '<span style="font-size:10px;margin-right:5px;opacity:0.5">Color:</span>' +
      '<div class="note-color-dot ' + (noteColor === '#1a1a2e' ? 'active' : '') + '" style="background:#1a1a2e" onclick="setNoteColor(\'#1a1a2e\', this)"></div>' +
      '<div class="note-color-dot ' + (noteColor === '#e53935' ? 'active' : '') + '" style="background:#e53935" onclick="setNoteColor(\'#e53935\', this)"></div>' +
      '<div class="note-color-dot ' + (noteColor === '#1e88e5' ? 'active' : '') + '" style="background:#1e88e5" onclick="setNoteColor(\'#1e88e5\', this)"></div>' +
      '<div class="note-color-dot ' + (noteColor === '#43a047' ? 'active' : '') + '" style="background:#43a047" onclick="setNoteColor(\'#43a047\', this)"></div>' +
      '<div class="note-color-dot ' + (noteColor === '#fb8c00' ? 'active' : '') + '" style="background:#fb8c00" onclick="setNoteColor(\'#fb8c00\', this)"></div>' +
      '<div class="note-color-dot ' + (noteColor === '#8e24aa' ? 'active' : '') + '" style="background:#8e24aa" onclick="setNoteColor(\'#8e24aa\', this)"></div>' +
      '<div class="note-color-dot ' + (noteColor === '#ec4899' ? 'active' : '') + '" style="background:#ec4899" onclick="setNoteColor(\'#ec4899\', this)"></div>' +
      '<span style="font-size:10px;margin-left:8px;opacity:0.5">W:</span>' +
      '<input type="range" min="1" max="20" value="' + noteLineWidth + '" style="width:55px;accent-color:var(--accent)" oninput="noteLineWidth=parseInt(this.value)">' +
      '</div>' +
      '<div class="note-canvas-wrap" id="noteCanvasWrap"><canvas id="noteCanvas"></canvas></div>' +
      '<div class="note-tools">' +
      '<button class="note-tool-btn ' + (noteTool === 'pen' ? 'active' : '') + '" onclick="setNoteTool(\'pen\', this)">Pen</button>' +
      '<button class="note-tool-btn ' + (noteTool === 'marker' ? 'active' : '') + '" onclick="setNoteTool(\'marker\', this)">Marker</button>' +
      '<button class="note-tool-btn ' + (noteTool === 'eraser' ? 'active' : '') + '" onclick="setNoteTool(\'eraser\', this)">Eraser</button>' +
      '<button class="note-tool-btn" onclick="clearNoteCanvas()">Clear</button>' +
      '<button class="note-tool-btn" onclick="saveNoteToMaterial()">Save</button>' +
      '</div>';
    setTimeout(() => initNoteCanvas(pageNum), 50);
  } else {
    const mat = currentViewerMaterial;
    const pageNotes = (mat.notes && mat.notes[String(pageNum)]) ? mat.notes[String(pageNum)] : [];
    const imported = pageNotes.find(n => n.type === 'imported');
    area.innerHTML =
      '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px">' +
      '<div style="font-size:44px;opacity:0.25">⇧</div>' +
      '<p style="color:var(--text-secondary);font-size:12px">Import PDF or PNG as note</p>' +
      '<button class="note-mode-btn" onclick="document.getElementById(\'noteFileInput\').click()" style="padding:9px 20px;font-size:13px">Select File</button>' +
      '<input type="file" id="noteFileInput" accept=".pdf,.png,.jpg,.jpeg" style="display:none" onchange="handleNoteFileImport(event)">' +
      '<div id="noteImportPreview" style="max-width:100%;max-height:260px;overflow:hidden;">' +
      (imported ? (imported.fileType === 'pdf' ? '<p style="font-size:11px">PDF note imported</p>' : '<img src="' + imported.data + '" style="max-width:100%;max-height:240px;border-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,0.1)">') : '') +
      '</div></div>';
  }
}

function initNoteCanvas(pageNum) {
  const canvas = document.getElementById('noteCanvas');
  const wrap = document.getElementById('noteCanvasWrap');
  if (!canvas || !wrap) return;
  noteCanvas = canvas;
  const rect = wrap.getBoundingClientRect();
  canvas.width = rect.width; canvas.height = rect.height;
  noteCtx = canvas.getContext('2d');
  noteStrokes = [];

  if (savedNoteImages[pageNum]) {
    const img = new Image();
    img.onload = () => noteCtx.drawImage(img, 0, 0);
    img.src = savedNoteImages[pageNum];
  } else {
    const mat = currentViewerMaterial;
    if (mat && mat.notes) {
      const pageNotes = mat.notes[String(pageNum)] || [];
      const hw = pageNotes.find(n => n.type === 'handwriting');
      if (hw && hw.strokes) { noteStrokes = hw.strokes; redrawNoteStrokes(); }
    }
  }

  canvas.onmousedown = (e) => noteStart(e);
  canvas.onmousemove = (e) => noteMove(e);
  canvas.onmouseup = () => noteEnd();
  canvas.onmouseleave = () => noteEnd();
  canvas.ontouchstart = (e) => { e.preventDefault(); noteStart(e.touches[0]); };
  canvas.ontouchmove = (e) => { e.preventDefault(); noteMove(e.touches[0]); };
  canvas.ontouchend = () => noteEnd();
}

function redrawNoteStrokes() {
  if (!noteCtx) return;
  noteCtx.clearRect(0, 0, noteCanvas.width, noteCanvas.height);
  for (const stroke of noteStrokes) {
    if (stroke.length < 2) continue;
    noteCtx.beginPath();
    noteCtx.strokeStyle = stroke[0].color; noteCtx.lineWidth = stroke[0].lineWidth;
    noteCtx.lineCap = 'round'; noteCtx.lineJoin = 'round';
    noteCtx.globalCompositeOperation = stroke[0].tool === 'eraser' ? 'destination-out' : 'source-over';
    noteCtx.moveTo(stroke[0].x, stroke[0].y);
    for (let i = 1; i < stroke.length; i++) noteCtx.lineTo(stroke[i].x, stroke[i].y);
    noteCtx.stroke();
  }
  noteCtx.globalCompositeOperation = 'source-over';
}

function noteStart(e) {
  isDrawing = true;
  const rect = noteCanvas.getBoundingClientRect();
  const sx = noteCanvas.width / rect.width;
  const sy = noteCanvas.height / rect.height;
  currentStroke = [{ x:(e.clientX-rect.left)*sx, y:(e.clientY-rect.top)*sy, color:noteTool==='eraser'?'rgba(0,0,0,1)':noteColor, lineWidth:noteTool==='marker'?noteLineWidth*2.5:noteLineWidth, tool:noteTool }];
}

function noteMove(e) {
  if (!isDrawing || !noteCtx) return;
  const rect = noteCanvas.getBoundingClientRect();
  const sx = noteCanvas.width / rect.width;
  const sy = noteCanvas.height / rect.height;
  const pt = { x:(e.clientX-rect.left)*sx, y:(e.clientY-rect.top)*sy, color:noteTool==='eraser'?'rgba(0,0,0,1)':noteColor, lineWidth:noteTool==='marker'?noteLineWidth*2.5:noteLineWidth, tool:noteTool };
  currentStroke.push(pt);
  const prev = currentStroke[currentStroke.length-2];
  noteCtx.beginPath(); noteCtx.strokeStyle = pt.color; noteCtx.lineWidth = pt.lineWidth;
  noteCtx.lineCap = 'round'; noteCtx.lineJoin = 'round';
  noteCtx.globalCompositeOperation = noteTool==='eraser'?'destination-out':'source-over';
  noteCtx.moveTo(prev.x, prev.y); noteCtx.lineTo(pt.x, pt.y);
  noteCtx.stroke(); noteCtx.globalCompositeOperation = 'source-over';
}

function noteEnd() {
  if (!isDrawing) return; isDrawing = false;
  if (currentStroke.length > 0) noteStrokes.push(currentStroke);
  currentStroke = [];
  if (noteCanvas) savedNoteImages[currentNotePage] = noteCanvas.toDataURL();
}

window.setNoteColor = function(c, el) { noteColor = c; document.querySelectorAll('.note-color-dot').forEach(d => d.classList.remove('active')); if (el) el.classList.add('active'); };
window.setNoteTool = function(t, el) { noteTool = t; document.querySelectorAll('.note-tool-btn').forEach(b => b.classList.remove('active')); if (el) el.classList.add('active'); };
window.clearNoteCanvas = function() { if (!noteCtx||!noteCanvas) return; noteCtx.clearRect(0,0,noteCanvas.width,noteCanvas.height); noteStrokes=[]; delete savedNoteImages[currentNotePage]; };

window.saveNoteToMaterial = function() {
  const mat = currentViewerMaterial; if (!mat) return;
  if (!mat.notes) mat.notes = {};
  const key = String(currentNotePage);
  let pageNotes = mat.notes[key] || [];
  if (noteMode === 'handwrite') {
    pageNotes = pageNotes.filter(n => n.type !== 'handwriting');
    if (noteStrokes.length > 0) pageNotes.push({ type:'handwriting', strokes:JSON.parse(JSON.stringify(noteStrokes)) });
  }
  mat.notes[key] = pageNotes;
  saveMaterials(); showToast('Note saved for page ' + currentNotePage);
};

window.handleNoteFileImport = function(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const mat = currentViewerMaterial; if (!mat) return;
    if (!mat.notes) mat.notes = {};
    const key = String(currentNotePage);
    let pageNotes = mat.notes[key] || [];
    pageNotes = pageNotes.filter(n => n.type !== 'imported');
    pageNotes.push({ type:'imported', data:e.target.result, fileType:file.name.endsWith('.pdf')?'pdf':'png' });
    mat.notes[key] = pageNotes;
    saveMaterials(); renderNoteContent(currentNotePage);
    showToast('File imported as note');
  };
  reader.readAsDataURL(file); event.target.value = '';
};

/* ========== Settings ========== */
window.toggleSettings = function() { document.getElementById('settingsOverlay').classList.toggle('hidden'); };

window.updateFontSize = function(val) {
  document.documentElement.style.setProperty('--font-size-base', val + 'px');
  document.documentElement.style.setProperty('--font-size-sm', (parseInt(val)-2) + 'px');
  document.documentElement.style.setProperty('--font-size-lg', (parseInt(val)+2) + 'px');
  document.documentElement.style.setProperty('--font-size-xl', (parseInt(val)+6) + 'px');
  document.documentElement.style.setProperty('--font-size-xxl', (parseInt(val)+12) + 'px');
  document.getElementById('fontSizeLabel').textContent = val + 'px';
  saveSettings({ fontSize:val, theme:document.body.getAttribute('data-theme'), mode:document.body.getAttribute('data-mode') });
};

window.setTheme = function(theme) {
  document.body.setAttribute('data-theme', theme);
  document.querySelectorAll('.theme-pick').forEach(o => o.classList.remove('active'));
  const el = document.querySelector('.theme-pick[data-theme="' + theme + '"]');
  if (el) el.classList.add('active');
  saveSettings({ fontSize:parseInt(getComputedStyle(document.documentElement).getPropertyValue('--font-size-base')), theme:theme, mode:document.body.getAttribute('data-mode') });
};

window.toggleMode = function() {
  const cur = document.body.getAttribute('data-mode');
  const nm = cur === 'dark' ? 'light' : 'dark';
  document.body.setAttribute('data-mode', nm);
  const t = document.getElementById('modeToggle');
  const l = t.querySelector('.toggle-label');
  if (nm === 'dark') { t.classList.add('active'); l.textContent = '夜间模式'; }
  else { t.classList.remove('active'); l.textContent = '日间模式'; }
  saveSettings({ fontSize:parseInt(getComputedStyle(document.documentElement).getPropertyValue('--font-size-base')), theme:document.body.getAttribute('data-theme'), mode:nm });
};

/* ========== Init ========== */
function init() {
  loadMaterials(); loadTrash(); renderAll();

  const settings = loadSettings();
  if (settings.theme) {
    document.body.setAttribute('data-theme', settings.theme);
    document.querySelectorAll('.theme-pick').forEach(o => o.classList.remove('active'));
    const ae = document.querySelector('.theme-pick[data-theme="' + settings.theme + '"]');
    if (ae) ae.classList.add('active');
  }
  if (settings.mode === 'dark') {
    document.body.setAttribute('data-mode', 'dark');
    const t = document.getElementById('modeToggle');
    t.classList.add('active'); t.querySelector('.toggle-label').textContent = '夜间模式';
  }
  if (settings.fontSize) {
    document.getElementById('fontSizeSlider').value = settings.fontSize;
    updateFontSize(settings.fontSize);
  }

  document.getElementById('settingsOverlay').onclick = function(e) { if (e.target === this) toggleSettings(); };
  document.getElementById('viewerOverlay').onclick = function(e) { if (e.target === this) closeViewer(); };
  document.getElementById('confirmOverlay').onclick = function(e) { if (e.target === this) closeConfirm(); };

  document.addEventListener('keydown', function(e) {
    if (!currentViewerMaterial) return;
    if (e.key === 'Escape') {
      if (document.getElementById('settingsOverlay').classList.contains('hidden') &&
          document.getElementById('confirmOverlay').classList.contains('hidden')) closeViewer();
    }
    if (e.key === 'ArrowLeft' && !e.target.closest('input')) viewerPrevPage();
    if (e.key === 'ArrowRight' && !e.target.closest('input')) viewerNextPage();
    if (e.key === 'f' && e.ctrlKey) { e.preventDefault(); toggleFullscreen(); }
  });

  // Close plus menu on outside click
  document.addEventListener('click', function(e) {
    if (plusMenuOpen && !e.target.closest('#plusMenu') && !e.target.closest('#fullscreenPlus')) {
      document.getElementById('plusMenu').classList.add('hidden');
      plusMenuOpen = false;
    }
  });

  console.log('Rhein Lab v3 ready. Materials:', materials.length, 'Trash:', trash.length);
}

/* Expose */
window.openMaterial = openMaterial;
window.viewerPrevPage = viewerPrevPage;
window.viewerNextPage = viewerNextPage;
window.viewerJumpPage = viewerJumpPage;
window.viewerGoToPage = viewerGoToPage;
window.viewerRotate = viewerRotate;

window.setNoteMode = setNoteMode;

window.clearNoteCanvas = clearNoteCanvas;

window.handleNoteFileImport = handleNoteFileImport;
window.toggleSettings = toggleSettings;
window.updateFontSize = updateFontSize;
window.setTheme = setTheme;
window.toggleMode = toggleMode;
window.deleteMaterial = deleteMaterial;
window.closeConfirm = closeConfirm;
window.handleFileImport = handleFileImport;
window.openTrash = openTrash;
window.closeTrash = closeTrash;
window.restoreFromTrash = restoreFromTrash;
window.permanentDelete = permanentDelete;
window.deleteCardFromCabinet = deleteCardFromCabinet;
window.toggleFullscreen = toggleFullscreen;
window.togglePlusMenu = togglePlusMenu;
window.addBlankPage = addBlankPage;
window.addNoteFromFS = addNoteFromFS;
window.togglePenTool = togglePenTool;
window.toggleEraser = toggleEraser;
window.setPenColor = setPenColor;
window.undoPenStroke = undoPenStroke;

init();
</script>

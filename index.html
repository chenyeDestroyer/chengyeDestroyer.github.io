<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhein Lab · Document System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.8.0/mammoth.browser.min.js"></script>
<style>
:root {
  --bg-main: #f4f6f9; --bg-card: #ffffff; --bg-sidebar: #1c2838;
  --text-primary: #1a1f2e; --text-secondary: #5a6577;
  --text-sidebar: #bcc8d6; --text-sidebar-active: #ffffff;
  --accent: #3b7dd8; --accent-light: #e6f0fa; --accent-dark: #265d9e;
  --accent-glow: rgba(59,125,216,0.10);
  --border: #d5dce6; --border-light: #e8ecf1;
  --shadow: 0 2px 12px rgba(0,0,0,0.05); --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
  --radius: 8px; --radius-lg: 14px;
  --font-size-base: 14px; --font-size-sm: 12px; --font-size-lg: 16px;
  --font-size-xl: 20px; --font-size-xxl: 26px;
  --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  --sidebar-width: 260px; --trigger-width: 14px;
  --delete-red: #e53935;
}

/* ====== 5 Rhein Lab Themes ====== */
[data-theme="rhine"] { /* 莱茵蓝 - default */ }
[data-theme="frost"] {
  --bg-main: #eef3f8; --bg-card: #fafcfd; --text-primary: #1a2a3a;
  --text-secondary: #5a6a7a; --accent: #4a90c4; --accent-light: #e1eff7;
  --accent-dark: #2d6894; --border: #c8d6e5; --border-light: #e0e8f0;
}
[data-theme="graphite"] {
  --bg-main: #e8eaed; --bg-card: #f5f5f7; --text-primary: #1a1c20;
  --text-secondary: #5a5d64; --accent: #546e7a; --accent-light: #e4e8eb;
  --accent-dark: #37474f; --border: #c8ccd0; --border-light: #e0e2e5;
}
[data-theme="ivory"] {
  --bg-main: #f7f3ed; --bg-card: #fdfaf6; --text-primary: #3a3028;
  --text-secondary: #7a7068; --accent: #a08060; --accent-light: #f0e8dc;
  --accent-dark: #705840; --border: #d8cec0; --border-light: #e8e0d4;
}
[data-theme="emerald"] {
  --bg-main: #eef4f1; --bg-card: #f7faf8; --text-primary: #1a2a24;
  --text-secondary: #4a6a5c; --accent: #2e7d6a; --accent-light: #dceee7;
  --accent-dark: #1b5e48; --border: #c0d4cc; --border-light: #dce8e2;
}

/* Dark mode */
[data-mode="dark"] {
  --bg-main: #111827; --bg-card: #1c2538; --bg-sidebar: #0a0f1a;
  --text-primary: #e2e8f0; --text-secondary: #94a3b8;
  --text-sidebar: #94a3b8; --text-sidebar-active: #e2e8f0;
  --border: #2d3a50; --border-light: #1e293b;
  --shadow: 0 2px 12px rgba(0,0,0,0.4); --shadow-lg: 0 8px 32px rgba(0,0,0,0.6);
}
[data-mode="dark"][data-theme="frost"] { --bg-main: #101824; --bg-card: #182030; }
[data-mode="dark"][data-theme="graphite"] { --bg-main: #141416; --bg-card: #1c1c1e; }
[data-mode="dark"][data-theme="ivory"] { --bg-main: #181410; --bg-card: #241c18; }
[data-mode="dark"][data-theme="emerald"] { --bg-main: #0c1614; --bg-card: #162420; }

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg-main); color:var(--text-primary);
  font-size:var(--font-size-base); overflow:hidden; height:100vh; display:flex;
  transition:background 0.5s,color 0.3s;
}

/* ====== Sidebar Auto-Hide ====== */
.sidebar-trigger {
  position:fixed; left:0; top:0; bottom:0; width:16px; z-index:150; cursor:default;
  background: linear-gradient(90deg,rgba(59,125,216,0.07) 0%,rgba(59,125,216,0.02) 50%,transparent 100%);
  backdrop-filter:blur(2px); transition:background 0.3s,width 0.2s;
}
.sidebar-trigger:hover { background:linear-gradient(90deg,rgba(59,125,216,0.14) 0%,rgba(59,125,216,0.05) 60%,transparent 100%); width:20px; }

.sidebar {
  position:fixed; left:0; top:0; bottom:0; width:260px;
  background:var(--bg-sidebar); color:var(--text-sidebar);
  display:flex; flex-direction:column; z-index:140;
  transform:translateX(-100%);
  transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
  overflow:hidden; box-shadow:4px 0 24px rgba(0,0,0,0.3);
}
.sidebar.open { transform:translateX(0); }

.sidebar-logo { padding:24px 20px; border-bottom:1px solid rgba(255,255,255,0.07); display:flex; align-items:center; gap:12px; }
.sidebar-logo .logo-hex {
  width:36px; height:36px; border:2px solid var(--accent); border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; color:var(--accent); transform:rotate(45deg);
}
.sidebar-logo .logo-hex span { transform:rotate(-45deg); }
.sidebar-logo .logo-text { font-size:16px; font-weight:600; color:var(--text-sidebar-active); letter-spacing:1px; }
.sidebar-logo .logo-sub { font-size:9px; color:var(--text-sidebar); letter-spacing:2px; text-transform:uppercase; opacity:0.5; }

.sidebar-section { padding:14px 20px 6px; font-size:9px; text-transform:uppercase; letter-spacing:2px; color:var(--text-sidebar); opacity:0.4; }
.sidebar-list { list-style:none; flex:1; overflow-y:auto; padding:0 10px; }
.sidebar-list::-webkit-scrollbar { width:3px; }
.sidebar-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:3px; }

.sidebar-item { padding:8px 12px; margin:1px 0; border-radius:6px; cursor:pointer; transition:all var(--transition); font-size:var(--font-size-sm); display:flex; align-items:center; gap:8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sidebar-item:hover { background:rgba(255,255,255,0.07); }
.sidebar-item.active { background:rgba(59,125,216,0.25); color:var(--text-sidebar-active); }
.sidebar-item .item-icon { font-size:13px; width:18px; text-align:center; flex-shrink:0; }
.sidebar-item .item-badge { margin-left:auto; background:var(--accent); color:#fff; font-size:8px; padding:1px 5px; border-radius:8px; flex-shrink:0; }

.sidebar-item.trash-item { margin-top:8px; border-top:1px solid rgba(255,255,255,0.06); padding-top:14px; opacity:0.65; }
.sidebar-item.trash-item:hover { opacity:1; background:rgba(229,57,53,0.2); }
.sidebar-item.trash-item .trash-count { margin-left:auto; background:var(--delete-red); color:#fff; font-size:8px; padding:1px 5px; border-radius:8px; flex-shrink:0; }

/* ====== Main ====== */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

.topbar { height:52px; min-height:52px; background:var(--bg-card); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; gap:12px; transition:background 0.3s,border 0.3s; z-index:10; }
.topbar-title { font-size:var(--font-size-lg); font-weight:600; }
.topbar-spacer { flex:1; }
.topbar-btn { width:34px; height:34px; border:1px solid var(--border); border-radius:var(--radius); background:var(--bg-card); color:var(--text-secondary); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:15px; transition:all var(--transition); }
.topbar-btn:hover { background:var(--accent-light); color:var(--accent); border-color:var(--accent); }

.content-area { flex:1; overflow-y:auto; overflow-x:hidden; padding:20px; transition:background 0.5s; }
.content-area::-webkit-scrollbar { width:4px; }
.content-area::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

/* ====== Action Card ====== */
.action-cards { display:flex; gap:14px; margin-bottom:24px; flex-wrap:wrap; }
.action-card { background:var(--bg-card); border:2px dashed var(--border); border-radius:var(--radius-lg); padding:16px 24px; cursor:pointer; transition:all var(--transition); display:flex; align-items:center; gap:12px; font-weight:500; color:var(--text-secondary); font-size:var(--font-size-base); }
.action-card:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-light); box-shadow:0 0 0 4px var(--accent-glow); }
.action-card .action-icon { font-size:20px; width:38px; height:38px; border-radius:var(--radius); background:var(--bg-main); display:flex; align-items:center; justify-content:center; transition:background var(--transition); }
.action-card:hover .action-icon { background:var(--accent); color:#fff; }

/* ====== Cabinet / Drag Grid ====== */
.cabinet-area { position:relative; min-height:460px; height:calc(100vh - 210px); }

.cabinet-card {
  position:absolute; width:175px;
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg);
  padding:14px; cursor:grab; user-select:none;
  transition:box-shadow 0.2s,border-color 0.2s;
  overflow:visible; display:flex; flex-direction:column; box-shadow:var(--shadow);
  z-index:1;
}
.cabinet-card:hover { box-shadow:var(--shadow-lg); border-color:var(--accent); z-index:5; }
.cabinet-card.dragging { cursor:grabbing; z-index:100 !important; box-shadow:0 16px 48px rgba(0,0,0,0.2) !important; opacity:0.94; transform:scale(1.05); border-color:var(--accent); transition:none; }
.cabinet-card.long-pressing { box-shadow:0 0 0 3px var(--accent-glow); border-color:var(--accent); }

/* Hover delete button */
.cabinet-card .delete-btn {
  position:absolute; top:-8px; right:-8px;
  width:22px; height:22px; border-radius:50%;
  background:var(--delete-red); color:#fff; border:none;
  font-size:12px; cursor:pointer; display:none;
  align-items:center; justify-content:center;
  z-index:10; line-height:1; box-shadow:0 2px 6px rgba(229,57,53,0.4);
  transition:transform 0.15s;
}
.cabinet-card:hover .delete-btn { display:flex; }
.cabinet-card .delete-btn:hover { transform:scale(1.2); }
.cabinet-card.dragging .delete-btn, .cabinet-card.long-pressing .delete-btn { display:none !important; }

.cabinet-card .card-accent { position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--accent),var(--accent-dark)); opacity:0; transition:opacity var(--transition); }
.cabinet-card:hover .card-accent { opacity:1; }
.cabinet-card .card-icon { font-size:26px; margin-bottom:6px; opacity:0.8; }
.cabinet-card .card-name { font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:3px; }
.cabinet-card .card-meta { font-size:10px; color:var(--text-secondary); display:flex; align-items:center; gap:5px; }
.cabinet-card .card-type { display:inline-block; padding:1px 7px; background:var(--accent-light); color:var(--accent); border-radius:3px; font-size:9px; font-weight:500; margin-top:auto; width:fit-content; }

/* ====== Viewer ====== */
.viewer-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:200; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px); animation:fadeIn 0.2s ease; overflow:hidden; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

.viewer-container { background:var(--bg-card); border-radius:var(--radius-lg); width:92vw; max-width:1150px; height:90vh; display:flex; flex-direction:column; box-shadow:var(--shadow-lg); animation:slideUp 0.25s ease; overflow:hidden; position:relative; }
.viewer-header { display:flex; align-items:center; padding:12px 16px; border-bottom:1px solid var(--border); gap:8px; flex-shrink:0; }
.viewer-header h3 { flex:1; font-size:var(--font-size-base); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.viewer-body { flex:1; overflow:hidden; display:flex; align-items:center; justify-content:center; background:var(--bg-main); padding:16px; position:relative; transition:background 0.3s; }

/* Page container with pen canvas overlay */
.page-wrapper { position:relative; display:inline-block; box-shadow:var(--shadow-lg); border-radius:2px; transition: transform 0.05s ease-out; }
.page-wrapper.pannable { cursor: grab; }
.page-wrapper.panning { cursor: grabbing; transition: none; }
.page-wrapper .page-canvas { display:block; border-radius:2px; }
.page-wrapper .pen-canvas { position:absolute; top:0; left:0; cursor:crosshair; border-radius:2px; }

.viewer-footer { display:flex; align-items:center; justify-content:center; padding:8px 16px; border-top:1px solid var(--border); gap:10px; flex-shrink:0; }
.viewer-footer button { padding:5px 12px; border:1px solid var(--border); background:var(--bg-card); border-radius:var(--radius); cursor:pointer; font-size:var(--font-size-sm); color:var(--text-primary); transition:all var(--transition); display:flex; align-items:center; gap:3px; }
.viewer-footer button:hover { background:var(--accent-light); border-color:var(--accent); color:var(--accent); }
.viewer-footer button:disabled { opacity:0.35; cursor:not-allowed; pointer-events:none; }
.viewer-footer button.active-tool { background:var(--accent); color:#fff; border-color:var(--accent); }
.viewer-footer .page-input { width:44px; text-align:center; border:1px solid var(--border); border-radius:var(--radius); padding:5px; font-size:var(--font-size-sm); background:var(--bg-card); color:var(--text-primary); }
.viewer-footer .page-info { font-size:var(--font-size-sm); color:var(--text-secondary); min-width:70px; text-align:center; }

/* Pen toolbar in viewer */
.pen-toolbar { display:flex; gap:5px; align-items:center; }
.pen-toolbar .pen-color { width:18px; height:18px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:all var(--transition); flex-shrink:0; }
.pen-toolbar .pen-color.active { border-color:var(--text-primary); transform:scale(1.2); }
.pen-toolbar .pen-size { width:60px; accent-color:var(--accent); }

/* ====== Fullscreen ====== */
body.fullscreen-active .viewer-overlay { background:#000; }
body.fullscreen-active .viewer-container { width:100vw; max-width:100vw; height:100vh; border-radius:0; }
body.fullscreen-active .viewer-header { background:rgba(0,0,0,0.7); border-bottom:1px solid rgba(255,255,255,0.1); color:#fff; position:absolute; top:0; left:0; right:0; z-index:20; }
body.fullscreen-active .viewer-header button { color:#ccc; border-color:rgba(255,255,255,0.2); background:rgba(255,255,255,0.05); }
body.fullscreen-active .viewer-header button:hover { color:#fff; border-color:#fff; }
body.fullscreen-active .viewer-body { background:#1a1a1a; padding:0; }
body.fullscreen-active .viewer-footer { background:rgba(0,0,0,0.7); border-top:1px solid rgba(255,255,255,0.1); position:absolute; bottom:0; left:0; right:0; z-index:20; }
body.fullscreen-active .viewer-footer button { color:#ccc; border-color:rgba(255,255,255,0.2); background:rgba(255,255,255,0.05); }
body.fullscreen-active .viewer-footer button:hover { color:#fff; border-color:#fff; }
body.fullscreen-active .viewer-footer button.active-tool { background:var(--accent); color:#fff; border-color:var(--accent); }
body.fullscreen-active .viewer-footer .page-input { color:#fff; background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.2); }
body.fullscreen-active .viewer-footer .page-info { color:#aaa; }
body.fullscreen-active .viewer-header button[onclick*="deleteMaterial"] { display:none; }
body.fullscreen-active .viewer-header button[onclick*="toggleNotePanel"] { display:none; }
body.fullscreen-active .note-panel { z-index:30; top:52px; bottom:44px; height:auto; }
body.fullscreen-active .note-panel .note-panel-header { padding-top:4px; }

/* Fullscreen + button */
/* Right-side auto-hide panel in fullscreen */
.fs-right-trigger {
  position:absolute; right:0; top:0; bottom:0; width:16px; z-index:28; cursor:default;
  background:linear-gradient(270deg,rgba(255,255,255,0.07) 0%,rgba(255,255,255,0.02) 50%,transparent 100%);
  transition:background 0.3s;
}
.fs-right-trigger:hover { background:linear-gradient(270deg,rgba(255,255,255,0.15) 0%,rgba(255,255,255,0.05) 60%,transparent 100%); }

.fs-right-panel {
  position:absolute; right:0; top:52px; bottom:44px; width:220px; z-index:29;
  background:rgba(20,20,30,0.94); border-left:1px solid rgba(255,255,255,0.1);
  transform:translateX(100%); transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
  display:flex; flex-direction:column; padding:12px; gap:6px;
  backdrop-filter:blur(8px);
}
.fs-right-panel.open { transform:translateX(0); }
.fs-right-panel button {
  padding:10px 14px; border:1px solid rgba(255,255,255,0.12); border-radius:var(--radius);
  background:rgba(255,255,255,0.04); color:#ccc; cursor:pointer; font-size:13px;
  text-align:left; transition:all var(--transition);
}
.fs-right-panel button:hover { background:rgba(255,255,255,0.12); color:#fff; border-color:rgba(255,255,255,0.25); }
.fs-right-panel button.danger { color:#e57373; border-color:rgba(229,115,115,0.2); }
.fs-right-panel button.danger:hover { background:rgba(229,57,53,0.15); border-color:rgba(229,57,53,0.4); }

/* ====== Note Panel ====== */
.note-panel { position:absolute; top:0; right:0; width:420px; height:100%; background:var(--bg-card); border-left:1px solid var(--border); z-index:10; display:flex; flex-direction:column; animation:slideIn 0.25s ease; box-shadow:-4px 0 20px rgba(0,0,0,0.1); min-width:300px; max-width:700px; }
.note-panel .resize-handle { position:absolute; left:0; top:0; bottom:0; width:6px; cursor:col-resize; z-index:5; background:transparent; transition:background 0.2s; }
.note-panel .resize-handle:hover, .note-panel .resize-handle:active { background:var(--accent); opacity:0.5; }
@keyframes slideIn { from{transform:translateX(100%)} to{transform:translateX(0)} }
.note-panel-header { padding:12px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }
.note-panel-header h4 { flex:1; font-size:var(--font-size-base); }
.note-mode-select { display:flex; gap:6px; padding:10px 14px; border-bottom:1px solid var(--border-light); }
.note-mode-btn { flex:1; padding:7px; border:1px solid var(--border); border-radius:var(--radius); background:var(--bg-card); cursor:pointer; font-size:var(--font-size-sm); transition:all var(--transition); text-align:center; color:var(--text-secondary); }
.note-mode-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.note-mode-btn:hover:not(.active) { border-color:var(--accent); color:var(--accent); }
.note-format-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.note-format-btn:hover:not(.active) { border-color:var(--accent); color:var(--accent); }
.note-colors { display:flex; gap:5px; padding:8px 14px; border-bottom:1px solid var(--border-light); flex-wrap:wrap; align-items:center; }
.note-color-dot { width:18px; height:18px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:all var(--transition); }
.note-color-dot.active { border-color:var(--text-primary); transform:scale(1.2); }
.note-canvas-wrap { flex:1; position:relative; overflow:hidden; background:#fff; margin:10px; border-radius:var(--radius); border:1px solid var(--border-light); }
.note-canvas-wrap canvas { position:absolute; top:0; left:0; width:100%; height:100%; cursor:crosshair; }
.note-tools { display:flex; gap:3px; padding:8px 14px; border-top:1px solid var(--border-light); flex-wrap:wrap; }
.note-tool-btn { padding:4px 8px; border:1px solid var(--border); border-radius:4px; background:var(--bg-card); cursor:pointer; font-size:10px; transition:all var(--transition); color:var(--text-secondary); }
.note-tool-btn:hover { border-color:var(--accent); color:var(--accent); }
.note-tool-btn.active { background:var(--accent-light); border-color:var(--accent); color:var(--accent); font-weight:600; }
.note-file-import { padding:10px 14px; border-top:1px solid var(--border-light); display:flex; gap:6px; flex-wrap:wrap; }
.note-file-import input[type="file"] { display:none; }

/* ====== Trash View ====== */
.trash-view { padding:20px; }
.trash-view h2 { font-size:var(--font-size-xl); margin-bottom:4px; display:flex; align-items:center; gap:8px; }
.trash-view .trash-subtitle { font-size:var(--font-size-sm); color:var(--text-secondary); margin-bottom:18px; }
.trash-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:14px; }
.trash-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:14px; opacity:0.7; transition:all var(--transition); display:flex; flex-direction:column; gap:6px; }
.trash-card:hover { opacity:1; box-shadow:var(--shadow-lg); }
.trash-card .trash-card-name { font-weight:600; font-size:12px; }
.trash-card .trash-card-meta { font-size:9px; color:var(--text-secondary); }
.trash-card .trash-actions { display:flex; gap:6px; margin-top:6px; }
.trash-card .trash-actions button { flex:1; padding:5px 8px; border-radius:var(--radius); border:1px solid var(--border); cursor:pointer; font-size:10px; transition:all var(--transition); background:var(--bg-card); color:var(--text-primary); }
.trash-card .trash-actions .btn-restore:hover { background:#10b981; color:#fff; border-color:#10b981; }
.trash-card .trash-actions .btn-delete:hover { background:var(--delete-red); color:#fff; border-color:var(--delete-red); }

.trash-drop-zone { height:48px; border:2px dashed var(--border); border-radius:var(--radius); margin:12px; display:flex; align-items:center; justify-content:center; gap:8px; color:var(--text-secondary); opacity:0.3; transition:all var(--transition); cursor:default; }

/* ========== Persistence ========== */
function saveMaterials() { localStorage.setItem(STORAGE_KEY, JSON.stringify(materials)); }
function loadMaterials() { const d = localStorage.getItem(STORAGE_KEY); if(d) { try { materials = JSON.parse(d); } catch(e) { materials = []; } } }
function saveTrash() { localStorage.setItem(TRASH_KEY, JSON.stringify(trash)); }
function loadTrash() { const d = localStorage.getItem(TRASH_KEY); if(d) { try { trash = JSON.parse(d); } catch(e) { trash = []; } } }
function saveSettings(s) { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }
function loadSettings() { const d = localStorage.getItem(SETTINGS_KEY); if(d) { try { return JSON.parse(d); } catch(e) { return {}; } } return {}; }

/* ========== Helpers ========== */
function showToast(msg) {
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; }, 2000);
  setTimeout(() => t.remove(), 2500);
}
function generateId() { return 'm_' + Date.now() + '_' + Math.random().toString(36).substr(2,6); }
function getMaterialIcon(type) { const m = { empty:'□', pdf:'▣', docx:'▨', png:'◢', jpg:'◢', jpeg:'◢' }; return m[type] || '□'; }
function getMaterialTypeLabel(type) { const m = { empty:'Blank', pdf:'PDF', docx:'DOCX', png:'Image', jpg:'Image', jpeg:'Image' }; return m[type] || type.toUpperCase(); }
function findFreePosition() {
  const area = document.getElementById('cabinetArea');
  const w = area ? area.clientWidth : 800;
  const cols = Math.max(1, Math.floor((w - 20) / 195));
  const idx = materials.length;
  return { x: 10 + (idx % cols) * 195, y: 10 + Math.floor(idx / cols) * 175 };
}

/* ========== Material Import ========== */
window.handleFileImport = async function(event) {
  const file = event.target.files[0]; if (!file) return;
  const name = file.name.replace(/\.[^.]+$/, '');
  let type = file.name.split('.').pop().toLowerCase();
  if (type === 'jpg') type = 'jpeg';
  showToast('Importing: ' + file.name);

  const reader = new FileReader();
  reader.onload = async function(e) {
    const pos = findFreePosition();
    const mat = {
      id: generateId(), name: name, type: type, content: e.target.result,
      createdAt: Date.now(), lastPage: 1, pageCount: 1,
      x: pos.x, y: pos.y, notes: {}, pageAnnotations: {}, extraPages: {}
    };

    if (type === 'pdf' && typeof pdfjsLib !== 'undefined') {
      try {
        const b64 = e.target.result.split('base64,')[1];
        const bin = atob(b64);
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
        mat.pageCount = pdf.numPages;
      } catch(err) { mat.pageCount = 1; }
    }

    materials.push(mat);
    saveMaterials(); renderAll();
    showToast('Imported: ' + file.name);
  };
  reader.readAsDataURL(file);
  event.target.value = '';
};

/* ========== Drag & Drop ========== */
function initDragEvents() {
  document.querySelectorAll('.cabinet-card').forEach(card => {
    card.addEventListener('mousedown', onDragStart);
    card.addEventListener('touchstart', onDragStart, { passive: false });
  });
}

function onDragStart(e) {
  const card = e.currentTarget;
  const matId = card.dataset.materialId;
  if (!matId || dragState.active) return;

  // Don't start drag if clicking delete button
  if (e.target.closest('.delete-btn')) return;

  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;

  dragState.materialId = matId; dragState.cardEl = card;
  dragState.startX = cx; dragState.startY = cy;
  dragState.longPressTriggered = false;

  dragState.longPressTimer = setTimeout(() => {
    dragState.longPressTriggered = true;
    startDragging(cx, cy);
  }, 450);

  card.classList.add('long-pressing');
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragEnd);
  document.addEventListener('touchmove', onDragMove, { passive: false });
  document.addEventListener('touchend', onDragEnd);
}

function startDragging(cx, cy) {
  dragState.active = true;
  const card = dragState.cardEl;
  card.classList.remove('long-pressing');
  card.classList.add('dragging');
  const rect = card.getBoundingClientRect();
  dragState.origX = parseInt(card.style.left) || 0;
  dragState.origY = parseInt(card.style.top) || 0;
  dragState.offsetX = cx - rect.left;
  dragState.offsetY = cy - rect.top;
}

function onDragMove(e) {
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;

  if (!dragState.active && !dragState.longPressTriggered) {
    if (Math.abs(cx - dragState.startX) > 5 || Math.abs(cy - dragState.startY) > 5) {
      cancelDrag(); return;
    }
  }
  if (!dragState.active) return;
  e.preventDefault();

  const area = document.getElementById('cabinetArea');
  const ar = area.getBoundingClientRect();
  dragState.cardEl.style.left = Math.max(0, cx - ar.left - dragState.offsetX) + 'px';
  dragState.cardEl.style.top = Math.max(0, cy - ar.top - dragState.offsetY) + 'px';
  // Check trash drop zone
  const tdz = document.getElementById('trashDropZone');
  if (tdz) {
    const tr = tdz.getBoundingClientRect();
    if (cy >= tr.top && cy <= tr.bottom && cx >= tr.left && cx <= tr.right) {
      tdz.classList.add('drag-over');
    } else {
      tdz.classList.remove('drag-over');
    }
  }
}

function onDragEnd() {
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', onDragEnd);
  document.removeEventListener('touchmove', onDragMove);
  document.removeEventListener('touchend', onDragEnd);

  if (dragState.longPressTimer) { clearTimeout(dragState.longPressTimer); dragState.longPressTimer = null; }

  // Clear trash zone highlight
  const tdz = document.getElementById('trashDropZone');
  if (tdz) tdz.classList.remove('drag-over');
  
  if (dragState.active) {
    dragState.cardEl.classList.remove('dragging');
    // Check if dropped on trash zone
    if (tdz) {
      const tr = tdz.getBoundingClientRect();
      const cardRect = dragState.cardEl.getBoundingClientRect();
      const cardCenterY = cardRect.top + cardRect.height / 2;
      if (cardCenterY >= tr.top && cardCenterY <= tr.bottom) {
        // Drop on trash - delete the material
        const idx = materials.findIndex(m => m.id === dragState.materialId);
        if (idx !== -1) {
          const [deleted] = materials.splice(idx, 1);
          deleted.deletedAt = Date.now();
          trash.push(deleted);
          saveMaterials(); saveTrash();
          renderAll();
          showToast('已移至回收站');
          dragState.active = false; dragState.materialId = null;
          dragState.cardEl = null; dragState.longPressTriggered = false;
          return;
        }
      }
    }
    const mat = materials.find(m => m.id === dragState.materialId);
    if (mat) {
      mat.x = parseInt(dragState.cardEl.style.left) || dragState.origX;
      mat.y = parseInt(dragState.cardEl.style.top) || dragState.origY;
      saveMaterials();
    }
  } else if (!dragState.longPressTriggered && dragState.cardEl) {
    dragState.cardEl.classList.remove('long-pressing');
    const matId = dragState.materialId;
    if (matId) window.openMaterial(matId);
  }

  dragState.active = false; dragState.materialId = null;
  dragState.cardEl = null; dragState.longPressTriggered = false;
}

function cancelDrag() {
  if (dragState.longPressTimer) { clearTimeout(dragState.longPressTimer); dragState.longPressTimer = null; }
  if (dragState.cardEl) dragState.cardEl.classList.remove('long-pressing');
  dragState.active = false;
}

/* ========== Hover Delete ========== */
window.deleteCardFromCabinet = function(matId) {
  const idx = materials.findIndex(m => m.id === matId);
  if (idx === -1) return;
  const [deleted] = materials.splice(idx, 1);
  deleted.deletedAt = Date.now();
  trash.push(deleted);
  saveMaterials(); saveTrash();
  // Also close viewer if this material was open
  if (currentViewerMaterial && currentViewerMaterial.id === matId) closeViewer();
  renderAll();
  showToast('Moved to trash');
};

function renderTrashView() {
  const grid = document.getElementById('trashGrid');
  if (trash.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">□</div><p>回收站为空</p></div>';

  }

    '<button class="btn-delete" onclick="permanentDelete(' + i + ')">✖ 彻底删除</button>' +
    '</div></div>'
  ).join('');

window.restoreFromTrash = function(idx) {
  if (idx < 0 || idx >= trash.length) return;
  const mat = trash.splice(idx, 1)[0];
  delete mat.deletedAt;
  const pos = findFreePosition();
  mat.x = pos.x; mat.y = pos.y;
  materials.push(mat);
  saveMaterials(); saveTrash();
  renderAll();
  if (trash.length === 0) closeTrash();
  showToast('Restored: ' + mat.name);
};

window.permanentDelete = function(idx) {
  if (idx < 0 || idx >= trash.length) return;
  const mat = trash[idx];
  pendingAction = { type:'permDelete', idx:idx, name:mat.name };
  document.getElementById('confirmMessage').textContent = 'Permanently delete "' + mat.name + '"? This cannot be undone.';
  document.getElementById('confirmOverlay').classList.remove('hidden');
  document.getElementById('confirmOkBtn').onclick = confirmPermDelete;
};

function confirmPermDelete() {
  if (!pendingAction || pendingAction.type !== 'permDelete') return;
  trash.splice(pendingAction.idx, 1);
  saveTrash(); pendingAction = null;
  closeConfirm(); renderAll();
  if (trash.length === 0) closeTrash();
  showToast('Permanently deleted');
}

window.closeConfirm = function() { document.getElementById('confirmOverlay').classList.add('hidden'); pendingAction = null; };

/* ========== Open Material ========== */
window.openMaterial = function(matId) {
  const mat = materials.find(m => m.id === matId);
  if (!mat) return;
  currentViewerMaterial = mat;
  viewerCurrentPage = mat.lastPage || 1;
  viewerRotation = 0;
  viewerZoom = 1.0;
  notePanelOpen = false; penToolActive = false; eraserActive = false;
  penStrokes = []; pageSnapshots = {};
  currentNotePage = viewerCurrentPage;

  document.getElementById('viewerTitle').textContent = mat.name;
  updateZoomLabel();
  document.getElementById('viewerOverlay').classList.remove('hidden');
  // Clear global per-page state for new material
  pageSnapshots = {}; penStrokes = []; savedNoteImages = {}; panX = 0; panY = 0;
  document.getElementById('notePanel').classList.add('hidden');
  document.getElementById('notePanel').innerHTML = '';
  document.getElementById('penToolbar').style.display = 'none';
  document.getElementById('penToolBtn').classList.remove('active-tool');
  document.getElementById('eraserToolBtn').classList.remove('active-tool');

  if (mat.type === 'pdf') openPdfViewer(mat);
  else if (mat.type === 'docx') openDocxViewer(mat);
  else if (mat.type === 'png' || mat.type === 'jpeg') openImageViewer(mat);
  else openEmptyViewer(mat);

  updateSidebarActive(matId);
};

/* ========== PDF Viewer ========== */
async function openPdfViewer(mat) {
  const container = document.getElementById('viewerContent');

  if (typeof pdfjsLib === 'undefined') {
    container.innerHTML = '<div style="text-align:center;color:var(--text-secondary);padding:40px"><p style="font-size:18px;margin-bottom:8px">PDF.js not loaded</p><p style="font-size:12px;opacity:0.6">Check internet connection</p></div>';
    return;
  }

  container.innerHTML = '<div style="text-align:center;color:var(--text-secondary);padding:40px"><p style="font-size:14px">Loading PDF...</p></div>';

  try {
    let bytes;
    const b64 = mat.content.includes('base64,') ? mat.content.split('base64,')[1] : mat.content;
    const binaryStr = atob(b64);
    bytes = new Uint8Array(binaryStr.length);
    for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i) & 0xFF;

    if (bytes.length === 0) {
      container.innerHTML = '<div style="text-align:center;padding:40px;color:#e53935"><p>PDF data is empty</p></div>';
      return;
    }

    // Disable worker for reliability - renders on main thread
    const loadingTask = pdfjsLib.getDocument({ data: bytes, disableWorker: true });
    viewerPdfDoc = await loadingTask.promise;

    if (!viewerPdfDoc || !viewerPdfDoc.numPages) {
      container.innerHTML = '<div style="text-align:center;padding:40px;color:#e53935"><p>PDF has no pages</p></div>';
      return;
    }

    viewerTotalPages = viewerPdfDoc.numPages + Object.keys(mat.extraPages || {}).length;
    mat.pageCount = viewerTotalPages;
    viewerCurrentPage = Math.min(Math.max(viewerCurrentPage, 1), viewerTotalPages);

    await renderCurrentPage();
    updateViewerFooter();

  } catch(err) {
    console.error('PDF error:', err);
    container.innerHTML = '<div style="text-align:center;padding:40px"><p style="font-size:14px;color:#e53935;margin-bottom:8px">Failed to load PDF</p><p style="font-size:12px;opacity:0.6">' + (err.message || 'Unknown') + '</p></div>';
  }
}

async function renderCurrentPage() {
  const mat = currentViewerMaterial;
  if (!mat) return;

  const container = document.getElementById('viewerContent');
  const pdfPageCount = viewerPdfDoc ? viewerPdfDoc.numPages : 0;

  // Check if this is an extra blank page
  if (viewerCurrentPage > pdfPageCount && mat.extraPages && mat.extraPages[viewerCurrentPage]) {
    // Render blank page
    container.innerHTML =
      '<div class="page-wrapper">' +
      '<canvas class="page-canvas" id="pageCanvas" width="800" height="1100" style="background:#fff"></canvas>' +
      '<canvas class="pen-canvas" id="penCanvas" width="800" height="1100"></canvas>' +
      '</div>';
    initPenCanvas(viewerCurrentPage);
    return;
  }

  if (mat.type === 'docx') {
    renderDocxPage(viewerCurrentPage);
    return;
  }

  if (mat.type === 'pdf' && viewerPdfDoc && viewerCurrentPage <= pdfPageCount) {
    try {
    const page = await viewerPdfDoc.getPage(viewerCurrentPage);
    
    // Calculate auto-fit scale based on container size
    const bodyEl = document.getElementById('viewerBody');
    const maxW = bodyEl.clientWidth - 40;
    const maxH = bodyEl.clientHeight - 40;
    const natViewport = page.getViewport({ scale: 1 });
    const fitScale = Math.min(maxW / natViewport.width, maxH / natViewport.height, 2.5);
    const baseScale = isFullscreen ? fitScale * 1.1 : fitScale;
    const scale = baseScale * viewerZoom;
    const viewport = page.getViewport({ scale, rotation: viewerRotation });

    container.innerHTML =
      '<div class="page-wrapper">' +
      '<canvas class="page-canvas" id="pageCanvas" width="' + viewport.width + '" height="' + viewport.height + '"></canvas>' +
      '<canvas class="pen-canvas" id="penCanvas" width="' + viewport.width + '" height="' + viewport.height + '"></canvas>' +
      '</div>';

    const pc = document.getElementById('pageCanvas');
    if (pc) {
      await page.render({ canvasContext: pc.getContext('2d'), viewport }).promise;
    }
    initPenCanvas(viewerCurrentPage);
    } catch(e) { console.error('PDF page render error:', e); container.innerHTML = '<p>Error rendering page ' + viewerCurrentPage + ': ' + e.message + '</p>'; }
  } else if ((mat.type === 'png' || mat.type === 'jpeg') && viewerCurrentPage === 1) {
    container.innerHTML =
      '<div class="page-wrapper">' +
      '<img src="' + mat.content + '" class="page-canvas" id="pageImage" style="max-width:100%;max-height:100%;transform:rotate(' + viewerRotation + 'deg)">' +
      '<canvas class="pen-canvas" id="penCanvas" style="position:absolute;top:0;left:0"></canvas>' +
      '</div>';
    setTimeout(() => {
      const img = document.getElementById('pageImage');
      const pc = document.getElementById('penCanvas');
      if (img && pc) {
        pc.width = img.naturalWidth || img.clientWidth;
        pc.height = img.naturalHeight || img.clientHeight;
      }
      initPenCanvas(viewerCurrentPage);
    }, 100);
  }
}

/* ========== Pen on Pages ========== */
function initPenCanvas(pageNum) {
  penCanvas = document.getElementById('penCanvas');
  if (!penCanvas) return;
  penCtx = penCanvas.getContext('2d');
  penStrokes = [];

  // Restore from snapshot
  if (pageSnapshots[pageNum]) {
    const img = new Image();
    img.onload = () => { penCtx.drawImage(img, 0, 0); };
    img.src = pageSnapshots[pageNum];
  } else {
    // Restore from stored annotations
    const mat = currentViewerMaterial;
    if (mat && mat.pageAnnotations && mat.pageAnnotations[pageNum]) {
      const ann = mat.pageAnnotations[pageNum];
      if (ann.strokes) {
        penStrokes = ann.strokes;
        redrawPenStrokes();
      } else if (ann.imageData) {
        const img = new Image();
        img.onload = () => { penCtx.drawImage(img, 0, 0); };
        img.src = ann.imageData;
      }
    }
  }

  penCanvas.onmousedown = penStart;
  penCanvas.onmousemove = penMove;
  penCanvas.onmouseup = penEnd;
  penCanvas.onmouseleave = penEnd;
  penCanvas.ontouchstart = (e) => { e.preventDefault(); penStart(e.touches[0]); };
  penCanvas.ontouchmove = (e) => { e.preventDefault(); penMove(e.touches[0]); };
  penCanvas.ontouchend = penEnd;
}

function redrawPenStrokes() {
  if (!penCtx || !penCanvas) return;
  penCtx.clearRect(0, 0, penCanvas.width, penCanvas.height);
  for (const stroke of penStrokes) {
    if (stroke.length < 2) continue;
    penCtx.beginPath();
    penCtx.strokeStyle = stroke[0].color;
    penCtx.lineWidth = stroke[0].lineWidth;
    penCtx.lineCap = 'round'; penCtx.lineJoin = 'round';
    penCtx.globalCompositeOperation = stroke[0].tool === 'eraser' ? 'destination-out' : 'source-over';
    penCtx.moveTo(stroke[0].x, stroke[0].y);
    for (let i = 1; i < stroke.length; i++) penCtx.lineTo(stroke[i].x, stroke[i].y);
    penCtx.stroke();
  }
  penCtx.globalCompositeOperation = 'source-over';
}

function penStart(e) {
  if (!penToolActive && !eraserActive) return;
  penIsDrawing = true;
  const rect = penCanvas.getBoundingClientRect();
  const sx = penCanvas.width / rect.width;
  const sy = penCanvas.height / rect.height;
  const pt = {
    x: (e.clientX - rect.left) * sx,
    y: (e.clientY - rect.top) * sy,
    color: eraserActive ? 'rgba(0,0,0,1)' : penColor,
    lineWidth: penWidth,
    tool: eraserActive ? 'eraser' : 'pen'
  };
  penCurrentStroke = [pt];
}

function penMove(e) {
  if (!penIsDrawing) return;
  const rect = penCanvas.getBoundingClientRect();
  const sx = penCanvas.width / rect.width;
  const sy = penCanvas.height / rect.height;
  const pt = {
    x: (e.clientX - rect.left) * sx,
    y: (e.clientY - rect.top) * sy,
    color: eraserActive ? 'rgba(0,0,0,1)' : penColor,
    lineWidth: penWidth,
    tool: eraserActive ? 'eraser' : 'pen'
  };
  penCurrentStroke.push(pt);

  const prev = penCurrentStroke[penCurrentStroke.length - 2];
  penCtx.beginPath();
  penCtx.strokeStyle = pt.color; penCtx.lineWidth = pt.lineWidth;
  penCtx.lineCap = 'round'; penCtx.lineJoin = 'round';
  penCtx.globalCompositeOperation = eraserActive ? 'destination-out' : 'source-over';
  penCtx.moveTo(prev.x, prev.y); penCtx.lineTo(pt.x, pt.y);
  penCtx.stroke();
  penCtx.globalCompositeOperation = 'source-over';
}

function penEnd() {
  if (!penIsDrawing) return;
  penIsDrawing = false;
  if (penCurrentStroke.length > 0) penStrokes.push(penCurrentStroke);
  penCurrentStroke = [];
  if (penCanvas) pageSnapshots[viewerCurrentPage] = penCanvas.toDataURL();
  savePageAnnotations();
}

window.undoPenStroke = function() {
  if (penStrokes.length === 0) return;
  penStrokes.pop();
  redrawPenStrokes();
  if (penCanvas) pageSnapshots[viewerCurrentPage] = penCanvas.toDataURL();
  savePageAnnotations();
};

}

/* ========== DOCX / Image / Empty Viewer ========== */
async function openDocxViewer(mat) {
  if (typeof mammoth === 'undefined') { document.getElementById('viewerContent').innerHTML = '<p>Mammoth.js not loaded</p>'; return; }
  try {
    const b64 = mat.content.split('base64,')[1];
    const bin = atob(b64); const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    const result = await mammoth.convertToHtml({ arrayBuffer: bytes.buffer });
    // Paginate DOCX content
    const pageCount = paginateDocxContent(result.value, mat);
    viewerTotalPages = pageCount + Object.keys(mat.extraPages || {}).length;
    mat.pageCount = viewerTotalPages;
    viewerCurrentPage = Math.min(viewerCurrentPage, viewerTotalPages);
    renderDocxPage(viewerCurrentPage);
    updateViewerFooter();
  } catch(err) { document.getElementById('viewerContent').innerHTML = '<p>DOCX error: ' + err.message + '</p>'; }
}

// Store paginated DOCX data per material (in memory)
let docxPageData = {}; // { matId: { html: string, pages: [{startNode, endNode, content}], pageHeight: number } }

const PAGE_WIDTH = 760;
const PAGE_HEIGHT = 1060;

function paginateDocxContent(html, mat) {
  // Create measurement container
  const measure = document.createElement('div');
  measure.style.cssText = 'position:absolute;left:-9999px;top:0;width:' + PAGE_WIDTH + 'px;visibility:hidden;font-family:Georgia,"Times New Roman",serif;font-size:14px;line-height:1.7;color:#1a1a2e;';
  measure.innerHTML = html;
  document.body.appendChild(measure);

  // Wait for layout
  const totalHeight = measure.scrollHeight;
  const rawPageCount = Math.ceil(totalHeight / PAGE_HEIGHT);
  const pages = [];

  if (rawPageCount <= 1) {
    // Single page - just wrap
    pages.push({ content: html, pageNum: 1 });
  } else {
    // Split by walking DOM nodes
    const children = Array.from(measure.children);
    let currentPageContent = '';
    let currentPageHeight = 0;
    let pageNum = 1;

    for (const child of children) {
      const childHeight = child.offsetHeight + parseInt(getComputedStyle(child).marginBottom || 0) + parseInt(getComputedStyle(child).marginTop || 0);

      if (currentPageHeight + childHeight > PAGE_HEIGHT && currentPageContent !== '') {
        pages.push({ content: currentPageContent, pageNum: pageNum });
        currentPageContent = '';
        currentPageHeight = 0;
        pageNum++;
      }

      currentPageContent += child.outerHTML;
      currentPageHeight += childHeight;
    }

    if (currentPageContent !== '') {
      pages.push({ content: currentPageContent, pageNum: pageNum });
    }
  }

  document.body.removeChild(measure);

  // Store for later use
  docxPageData[mat.id] = { html: html, pages: pages, pageHeight: PAGE_HEIGHT };
  return pages.length;
}

function renderDocxPage(pageNum) {
  const mat = currentViewerMaterial;
  if (!mat || !docxPageData[mat.id]) return;
  const data = docxPageData[mat.id];
  const pageIdx = pageNum - 1;

  // Check if extra page
  const basePages = data.pages.length;
  if (pageNum > basePages && mat.extraPages && mat.extraPages[pageNum]) {
    document.getElementById('viewerContent').innerHTML =
      '<div class="page-wrapper">' +
      '<div class="docx-page" style="width:' + PAGE_WIDTH + 'px;height:' + PAGE_HEIGHT + 'px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;color:#ccc">Blank Page</div>' +
      '<canvas class="pen-canvas" id="penCanvas" width="' + PAGE_WIDTH + '" height="' + PAGE_HEIGHT + '"></canvas>' +
      '</div>';
    initPenCanvas(pageNum);
    return;
  }

  if (pageIdx < 0 || pageIdx >= data.pages.length) return;
  const page = data.pages[pageIdx];

  document.getElementById('viewerContent').innerHTML =
    '<div class="page-wrapper">' +
    '<div class="docx-page" style="width:' + PAGE_WIDTH + 'px;min-height:' + PAGE_HEIGHT + 'px;background:#fff;padding:40px 48px;font-family:Georgia,"Times New Roman",serif;font-size:14px;line-height:1.7;color:#1a1a2e;box-shadow:var(--shadow-lg);overflow:hidden;">' +
    page.content +
    '</div>' +
    '<canvas class="pen-canvas" id="penCanvas" width="' + PAGE_WIDTH + '" height="' + PAGE_HEIGHT + '"></canvas>' +
    '</div>';
  initPenCanvas(pageNum);
}

function openImageViewer(mat) {
  viewerTotalPages = 1 + Object.keys(mat.extraPages || {}).length;
  viewerCurrentPage = Math.min(viewerCurrentPage, viewerTotalPages);
  renderCurrentPage();
  updateViewerFooter();
}

function openEmptyViewer(mat) {
  document.getElementById('viewerContent').innerHTML = '<div style="text-align:center;color:var(--text-secondary)"><div style="font-size:44px;margin-bottom:8px">□</div><p>Empty Material</p></div>';
  viewerTotalPages = 1 + Object.keys(mat.extraPages || {}).length;
  updateViewerFooter();
}

/* ========== Viewer Controls ========== */
function updateViewerFooter() {
  document.getElementById('pageInput').value = viewerCurrentPage;
  document.getElementById('pageInput').max = viewerTotalPages;
  document.getElementById('pageInfo').textContent = viewerCurrentPage + ' / ' + viewerTotalPages;
  document.getElementById('btnPrev').disabled = viewerCurrentPage <= 1;
  document.getElementById('btnNext').disabled = viewerCurrentPage >= viewerTotalPages;
}
window.viewerPrevPage = function() { if (viewerCurrentPage > 1) goToViewerPage(viewerCurrentPage - 1); };
window.viewerNextPage = function() { if (viewerCurrentPage < viewerTotalPages) goToViewerPage(viewerCurrentPage + 1); };
window.viewerJumpPage = function() {
  const page = prompt('Jump to (1-' + viewerTotalPages + '):', viewerCurrentPage);
  if (page) { const p = parseInt(page); if (p >= 1 && p <= viewerTotalPages) goToViewerPage(p); }
};
window.viewerGoToPage = function() {
  const p = parseInt(document.getElementById('pageInput').value);
  if (p >= 1 && p <= viewerTotalPages) goToViewerPage(p);
};

function goToViewerPage(pageNum) {
  // Save annotations for current page first
  if (penCanvas) { pageSnapshots[viewerCurrentPage] = penCanvas.toDataURL(); }
  savePageAnnotations();
  // Switch to new page
  penStrokes = [];
  viewerCurrentPage = pageNum;
  currentNotePage = pageNum;
  if (currentViewerMaterial) { currentViewerMaterial.lastPage = pageNum; saveMaterials(); }

  renderCurrentPage();
  updateViewerFooter();

  // Reset pen state but keep tool active
  penStrokes = [];
  if (penToolActive) {
    setTimeout(() => initPenCanvas(pageNum), 100);
  }
  // Close note panel when switching pages
  if (notePanelOpen || currentNoteId) {
    if (noteCanvas && currentViewerMaterial) savedNoteImages[currentNotePage] = noteCanvas.toDataURL();
    if (currentNoteId) saveCurrentNote();
    notePanelOpen = false;
    currentNoteId = null;
    document.getElementById('notePanel').classList.add('hidden');
    document.getElementById('notePanel').innerHTML = '';
  }
  // Refresh fullscreen right panel note list
  refreshNotePanel();
}

window.viewerRotate = function(deg) {
  viewerRotation = (viewerRotation + deg) % 360;
  goToViewerPage(viewerCurrentPage);
};

window.closeViewer = function() {
  if (penCanvas) pageSnapshots[viewerCurrentPage] = penCanvas.toDataURL();
  savePageAnnotations();
  document.getElementById('viewerOverlay').classList.add('hidden');
  viewerPdfDoc = null; viewerTotalPages = 0; viewerZoom = 1.0; currentViewerMaterial = null; docxPageData = {};
  notePanelOpen = false; penToolActive = false; eraserActive = false;
  document.getElementById('notePanel').classList.add('hidden');
  document.getElementById('notePanel').innerHTML = '';
  document.getElementById('penToolbar').style.display = 'none';
  document.getElementById('penToolBtn').classList.remove('active-tool');
  document.getElementById('eraserToolBtn').classList.remove('active-tool');
  if (isFullscreen) exitFullscreen();
  renderAll();
};

/* ========== Note Panel Refresh ========== */
function refreshNotePanel() {
  const list = document.getElementById('fsPanelNoteList');
  if (!list) return;
  const mat = currentViewerMaterial;
  if (!mat) { list.innerHTML = ''; return; }
  const pageNotes = (mat.notes && mat.notes[String(viewerCurrentPage)]) || [];
  if (pageNotes.length === 0) {
    list.innerHTML = '<div style="font-size:11px;color:#666;padding:6px">No notes yet</div>';
  } else {
    list.innerHTML = pageNotes.map(n =>
      '<div class="fs-note-item ' + (n.id === currentNoteId ? 'active' : '') + '" onclick="openSpecificNote(\'' + n.id + '\')">' +
      '<span>' + (n.type === 'imported' ? '⇧' : '✎') + '</span>' +
      '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + n.title + '</span>' +
      '<button class="note-delete" onclick="event.stopPropagation();deleteNote(\'' + n.id + '\')">×</button>' +
      '</div>'
    ).join('');
  }
}

window.deleteNote = function(noteId) {
  const mat = currentViewerMaterial;
  if (!mat || !mat.notes) return;
  const key = String(viewerCurrentPage);
  if (!mat.notes[key]) return;
  mat.notes[key] = mat.notes[key].filter(n => n.id !== noteId);
  if (mat.notes[key].length === 0) delete mat.notes[key];
  saveMaterials();
  if (currentNoteId === noteId) {
    currentNoteId = null; notePanelOpen = false;
    document.getElementById('notePanel').classList.add('hidden');
    document.getElementById('notePanel').innerHTML = '';
  }
  refreshNotePanel();
  showToast('Note deleted');
};

/* ========== Notes Management View ========== */
window.openNotesManagement = function() {
  if (materials.length === 0) { showToast('No materials to manage notes for'); return; }
  // Exit fullscreen and close viewer if open
  if (isFullscreen) exitFullscreen();
  if (currentViewerMaterial) closeViewer();
  // Use first material or currently viewed one
  const mat = currentViewerMaterial || materials[0];
  if (!mat && materials.length > 0) return;
  notesViewOpen = true;
  document.getElementById('mainView').classList.add('hidden');
  document.getElementById('trashView').classList.add('hidden');
  document.getElementById('notesMgmtView').classList.remove('hidden');

  document.getElementById('mainView').classList.remove('hidden');
  document.getElementById('notesMgmtView').classList.add('hidden');

function renderNotesManagement(mat) {
  if (!mat) return;
  document.getElementById('notesMgmtSubtitle').textContent = 'All notes for: ' + mat.name;
  const container = document.getElementById('notesMgmtContent');
  const allNotes = mat.notes || {};
  const pages = Object.keys(allNotes).map(Number).sort((a,b) => a-b);

  if (pages.length === 0) {
    container.innerHTML = '<div class="empty-state"><p>No notes in this document</p></div>';
    return;
  }

  container.innerHTML = pages.map(pg => {
    const notes = allNotes[pg] || [];
    return '<div class="note-group" data-page="' + pg + '">' +
      '<div class="note-group-label">第 ' + pg + ' 页 (' + notes.length + ' 条笔记)</div>' +
      '<div class="note-thumb-grid">' +
      notes.map((n, idx) => {
        let thumbHtml = '';
        if (n.type === 'imported' && n.data) {
          if (n.fileType === 'pdf') {
            thumbHtml = '<div class="note-thumb-pdf">📄 PDF</div>';
          } else {
            thumbHtml = '<img src="' + n.data + '" class="note-thumb-img" loading="lazy">';
          }
        } else if (n.strokes && n.strokes.length > 0) {
          thumbHtml = '<canvas class="note-thumb-canvas" width="140" height="90" data-strokes="' + encodeURIComponent(JSON.stringify(n.strokes)) + '"></canvas>';
        } else {
          thumbHtml = '<div class="note-thumb-empty">✎ 空笔记</div>';
        }
        return '<div class="note-thumb-card" draggable="true" ' +
          'data-note-id="' + n.id + '" data-page="' + pg + '" data-idx="' + idx + '" ' +
          'onclick="jumpToNote(\'' + mat.id + '\', ' + pg + ', \'' + n.id + '\')" ' +
          'ondragstart="noteThumbDragStart(event)" ondragover="noteThumbDragOver(event)" ondrop="noteThumbDrop(event)" ondragend="noteThumbDragEnd(event)">' +
          '<button class="note-thumb-delete" onclick="event.stopPropagation();deleteNoteGlobal(\'' + mat.id + '\', ' + pg + ', \'' + n.id + '\')">×</button>' +
          thumbHtml +
          '<div class="note-thumb-title">' + n.title + '</div>' +
          '<div class="note-thumb-meta">第' + pg + '页 · ' + (n.type === 'imported' ? '导入' : '手写') + '</div>' +
          '</div>';
      }).join('') +
      '</div></div>';
  }).join('');
  setTimeout(() => renderNoteThumbnails(), 150);
}

window.jumpToNote = function(matId, pageNum, noteId) {
  closeNotesManagement();
  window.openMaterial(matId);
  // Need to wait for viewer to open, then navigate
  setTimeout(() => {
    if (viewerPdfDoc || docxPageData[matId]) {
      goToViewerPage(pageNum);
    }
    setTimeout(() => {
      currentNoteId = noteId;
      currentNotePage = pageNum;
      notePanelOpen = true;
      openNotePanel(pageNum);
      refreshNotePanel();
    }, 300);
  }, 200);
};

// Global note drag-drop in management view
let noteDragData = null;
window.noteThumbDragStart = function(e) {
  const card = e.target.closest('.note-thumb-card');
  if (!card) return;
  noteDragData = { noteId: card.dataset.noteId, page: card.dataset.page, idx: card.dataset.idx };
  card.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', card.dataset.noteId);
};
window.noteThumbDragOver = function(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const card = e.target.closest('.note-thumb-card');
  if (card) card.classList.add('drag-over');
};
window.noteThumbDragEnd = function(e) {
  document.querySelectorAll('.note-thumb-card').forEach(c => c.classList.remove('dragging','drag-over'));
  noteDragData = null;
};
window.noteThumbDrop = function(e) {
  e.preventDefault();
  e.stopPropagation();
  document.querySelectorAll('.note-thumb-card').forEach(c => c.classList.remove('drag-over'));
  const target = e.target.closest('.note-thumb-card');
  if (!target || !noteDragData) return;
  // Find the material - use currentViewerMaterial or search
  let mat = currentViewerMaterial;
  if (!mat) {
    // Try to find from the notes management context
    const subtitle = document.getElementById('notesMgmtSubtitle');
    if (subtitle) {
      const matName = subtitle.textContent.replace('All notes for: ', '');
      mat = materials.find(m => m.name === matName);
    }
  }
  if (!mat || !mat.notes) return;
  const tgtPage = parseInt(target.dataset.page);
  const tgtIdx = parseInt(target.dataset.idx);
  const srcPage = parseInt(noteDragData.page);
  const srcIdx = parseInt(noteDragData.idx);
  const srcNoteId = noteDragData.noteId;
  
  if (srcPage === tgtPage && srcIdx === tgtIdx) return;
  
  // Find and remove source note
  const srcNotes = mat.notes[String(srcPage)] || [];
  const srcNote = srcNotes.find(n => n.id === srcNoteId);
  if (!srcNote) return;
  mat.notes[String(srcPage)] = srcNotes.filter(n => n.id !== srcNoteId);
  if (mat.notes[String(srcPage)].length === 0) delete mat.notes[String(srcPage)];
  
  // Insert at target position
  if (!mat.notes[String(tgtPage)]) mat.notes[String(tgtPage)] = [];
  const tgtNotes = mat.notes[String(tgtPage)];
  const insertIdx = Math.min(tgtIdx, tgtNotes.length);
  tgtNotes.splice(insertIdx, 0, srcNote);
  
  saveMaterials();
  renderNotesManagement(mat);
  refreshNotePanel();
  showToast('笔记已移动');
};

// Delete note globally from management view
window.deleteNoteGlobal = function(matId, pageNum, noteId) {
  if (!confirm('确定要删除这条笔记吗？')) return;
  const mat = materials.find(m => m.id === matId);
  if (!mat || !mat.notes) return;
  const key = String(pageNum);
  if (!mat.notes[key]) return;
  mat.notes[key] = mat.notes[key].filter(n => n.id !== noteId);
  if (mat.notes[key].length === 0) delete mat.notes[key];
  saveMaterials();
  renderNotesManagement(mat);
  refreshNotePanel();
  showToast('笔记已删除');
};

window.deleteMaterial = function() {
  if (!currentViewerMaterial) return;
  const mat = currentViewerMaterial;
  trash.push({ ...mat, deletedAt: Date.now() });
  materials = materials.filter(m => m.id !== mat.id);
  saveMaterials(); saveTrash();
  closeViewer(); renderAll();
  showToast('Moved to trash: ' + mat.name);
};

/* ========== Zoom ========== */
function updateZoomLabel() {
  const lbl = document.getElementById('zoomLabel');
  if (lbl) lbl.textContent = Math.round(viewerZoom * 100) + '%';
}

window.zoomIn = function() {
  viewerZoom = Math.min(3.0, viewerZoom + 0.25);
  updateZoomLabel();
  goToViewerPage(viewerCurrentPage);
};

window.zoomOut = function() {
  viewerZoom = Math.max(0.25, viewerZoom - 0.25);
  updateZoomLabel();
  goToViewerPage(viewerCurrentPage);
};

window.zoomReset = function() {
  viewerZoom = 1.0; panX = 0; panY = 0;
  updateZoomLabel();
  goToViewerPage(viewerCurrentPage);
};

// Note panel resize
function initNoteResize() {
  const handle = document.getElementById('noteResizeHandle');
  const panel = document.getElementById('notePanel');
  if (!handle || !panel) return;
  let startX = 0, startWidth = 0;
  handle.onmousedown = function(e) {
    e.preventDefault();
    startX = e.clientX;
    startWidth = panel.offsetWidth;
    document.addEventListener('mousemove', doResize);
    document.addEventListener('mouseup', stopResize);
  };
  function doResize(e) {
    const newWidth = Math.max(300, Math.min(700, startWidth + (startX - e.clientX)));
    notePanelWidth = newWidth;
    panel.style.width = newWidth + 'px';
  }
  function stopResize() {
    document.removeEventListener('mousemove', doResize);
    document.removeEventListener('mouseup', stopResize);
  }
}

// Note canvas wheel zoom
function initNoteWheelZoom() {
  const canvas = document.getElementById('noteCanvas');
  const wrap = document.getElementById('noteCanvasWrap');
  if (!canvas || !wrap) return;
  wrap.addEventListener('wheel', function(e) {
    e.preventDefault();
    if (e.deltaY < 0) noteZoom = Math.min(3.0, noteZoom + 0.15);
    else noteZoom = Math.max(0.3, noteZoom - 0.15);
    canvas.style.transform = 'scale(' + noteZoom + ')';
    canvas.style.transformOrigin = '0 0';
  }, { passive: false });
}

/* ========== Pan ========== */
function startPan(e) {
  if (penToolActive || eraserActive || isDrawing) return;
  if (!isFullscreen) return;
  if (e.button !== 0) return;
  isPanning = true;
  panStartX = e.clientX - panX;
  panStartY = e.clientY - panY;
  const pw = document.querySelector('.page-wrapper');
  if (pw) pw.classList.add('panning');
  document.addEventListener('mousemove', doPan);
  document.addEventListener('mouseup', stopPan);
  e.preventDefault();
}

function doPan(e) {
  if (!isPanning) return;
  panX = e.clientX - panStartX;
  panY = e.clientY - panStartY;
  const pw = document.querySelector('.page-wrapper');
  if (pw) pw.style.transform = 'translate(' + panX + 'px, ' + panY + 'px)';
}

function stopPan() {
  isPanning = false;
  const pw = document.querySelector('.page-wrapper');
  if (pw) pw.classList.remove('panning');
  document.removeEventListener('mousemove', doPan);
  document.removeEventListener('mouseup', stopPan);
}

// Wheel zoom in fullscreen (via onScrollWheel attached to viewerBody)

/* ========== Fullscreen ========== */
window.toggleFullscreen = function() {
  if (isFullscreen) exitFullscreen();
  else enterFullscreen();
};

function enterFullscreen() {
  isFullscreen = true;
  document.body.classList.add('fullscreen-active');
  document.getElementById('fsRightTrigger').classList.remove('hidden');
  document.getElementById('viewerBody').addEventListener('wheel', onScrollWheel, { passive: false });
  document.getElementById('viewerBody').addEventListener('mousedown', startPan);
  panX = 0; panY = 0;
  goToViewerPage(viewerCurrentPage);
}

function exitFullscreen() {
  isFullscreen = false;
  document.body.classList.remove('fullscreen-active');
  document.getElementById('fsRightTrigger').classList.add('hidden');
  document.getElementById('fsRightPanel').classList.remove('open');
  document.getElementById('viewerBody').removeEventListener('wheel', onScrollWheel);
  document.getElementById('viewerBody').removeEventListener('mousedown', startPan);
  panX = 0; panY = 0;
  goToViewerPage(viewerCurrentPage);
}

function onScrollWheel(e) {
  if (!isFullscreen) return;
  e.preventDefault();
  if (e.deltaY < 0) zoomIn();
  else zoomOut();
}

/* ========== Fullscreen + Button ========== */


window.addBlankPage = function() {
  const mat = currentViewerMaterial;
  if (!mat) return;
  if (!mat.extraPages) mat.extraPages = {};

  const insertAfter = viewerCurrentPage;
  viewerTotalPages++;

  // Shift existing extra pages that come after insertion point
  const newExtra = {};
  const keys = Object.keys(mat.extraPages).map(Number).sort((a,b) => a - b);
  for (const k of keys) {
    if (k > insertAfter) newExtra[k + 1] = mat.extraPages[k];
    else newExtra[k] = mat.extraPages[k];
  }
  newExtra[insertAfter + 1] = { type: 'blank', content: null, addedAt: Date.now() };
  mat.extraPages = newExtra;
  mat.pageCount = viewerTotalPages;

  // Also shift page annotations and notes
  if (mat.pageAnnotations) {
    const newAnns = {};
    const annKeys = Object.keys(mat.pageAnnotations).map(Number).sort((a,b) => a-b);
    for (const k of annKeys) {
      if (k > insertAfter) newAnns[k + 1] = mat.pageAnnotations[k];
      else newAnns[k] = mat.pageAnnotations[k];
    }
    mat.pageAnnotations = newAnns;
  }
  if (mat.notes) {
    const newNotes = {};
    const noteKeys = Object.keys(mat.notes).map(Number).sort((a,b) => a-b);
    for (const k of noteKeys) {
      if (k > insertAfter) newNotes[k + 1] = mat.notes[k];
      else newNotes[k] = mat.notes[k];
    }
    mat.notes = newNotes;
  }

  saveMaterials();
  goToViewerPage(insertAfter + 1);
  showToast('Blank page added after page ' + insertAfter);
};

window.deleteCurrentPage = function() {
  const mat = currentViewerMaterial;
  if (!mat) return;
  if (viewerTotalPages <= 1) { showToast('Cannot delete the only page'); return; }

  // Check if this is an extra page
  const pdfPgCount = viewerPdfDoc ? viewerPdfDoc.numPages : (mat.pageCount - Object.keys(mat.extraPages || {}).length);
  const isExtra = viewerCurrentPage > pdfPgCount && mat.extraPages && mat.extraPages[viewerCurrentPage];
  const isDocxExtra = mat.type === 'docx' && docxPageData[mat.id] && viewerCurrentPage > docxPageData[mat.id].pages.length;

  if (isExtra || isDocxExtra) {
    // Remove the extra page and shift others
    if (mat.extraPages) {
      const newExtra = {};
      for (const k of Object.keys(mat.extraPages).map(Number).sort((a,b) => a-b)) {
        if (k > viewerCurrentPage) newExtra[k - 1] = mat.extraPages[k];
        else if (k < viewerCurrentPage) newExtra[k] = mat.extraPages[k];
      }
      mat.extraPages = newExtra;
    }

    // Shift annotations and notes
    if (mat.pageAnnotations) {
      const newAnns = {};
      for (const k of Object.keys(mat.pageAnnotations).map(Number).sort((a,b) => a-b)) {
        if (k > viewerCurrentPage) newAnns[k - 1] = mat.pageAnnotations[k];
        else if (k < viewerCurrentPage) newAnns[k] = mat.pageAnnotations[k];
      }
      mat.pageAnnotations = newAnns;
    }
    if (mat.notes) {
      const newNotes = {};
      for (const k of Object.keys(mat.notes).map(Number).sort((a,b) => a-b)) {
        if (k > viewerCurrentPage) newNotes[k - 1] = mat.notes[k];
        else if (k < viewerCurrentPage) newNotes[k] = mat.notes[k];
      }
      mat.notes = newNotes;
    }

    viewerTotalPages--;
    mat.pageCount = viewerTotalPages;
    saveMaterials();
    if (viewerCurrentPage > viewerTotalPages) viewerCurrentPage = viewerTotalPages;
    goToViewerPage(viewerCurrentPage);
    showToast('Page deleted');
  } else {
    showToast('Cannot delete original document pages');
  }
};

      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      const scaleX = canvas.width / 420;
      const scaleY = canvas.height / 560;
      for (const stroke of strokes) {
        if (stroke.length < 2) continue;
        ctx.beginPath();
        ctx.strokeStyle = stroke[0].color;
        ctx.lineWidth = Math.max(1, stroke[0].lineWidth * scaleX);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.moveTo(stroke[0].x * scaleX, stroke[0].y * scaleY);
        for (let i = 1; i < stroke.length; i++) {
          ctx.lineTo(stroke[i].x * scaleX, stroke[i].y * scaleY);
        }
        ctx.stroke();
      }
    } catch(e) {}
  });
}

function initNoteCanvas(pageNum) {
  const canvas = document.getElementById('noteCanvas');
  const wrap = document.getElementById('noteCanvasWrap');
  if (!canvas || !wrap) return;
  noteCanvas = canvas;
  const rect = wrap.getBoundingClientRect();
  canvas.width = rect.width; canvas.height = rect.height;
  noteCtx = canvas.getContext('2d');
  noteStrokes = [];

  if (savedNoteImages[pageNum]) {
    const img = new Image();
    img.onload = () => noteCtx.drawImage(img, 0, 0);
    img.src = savedNoteImages[pageNum];
  } else {
    const mat = currentViewerMaterial;
    if (mat && mat.notes && currentNoteId) {
      const pageNotes = mat.notes[String(pageNum)] || [];
      const note = pageNotes.find(n => n.id === currentNoteId);
      if (note && note.strokes && note.strokes.length > 0) { noteStrokes = note.strokes; redrawNoteStrokes(); }
      else if (note && note.type === 'handwriting' && (!note.strokes || note.strokes.length === 0)) { /* fresh note, start empty */ }
    }
  }
  drawNoteFormatLines();

  canvas.onmousedown = (e) => noteStart(e);
  canvas.onmousemove = (e) => noteMove(e);
  canvas.onmouseup = () => noteEnd();
  canvas.onmouseleave = () => noteEnd();
  canvas.ontouchstart = (e) => { e.preventDefault(); noteStart(e.touches[0]); };
  canvas.ontouchmove = (e) => { e.preventDefault(); noteMove(e.touches[0]); };
  canvas.ontouchend = () => noteEnd();
  initNoteWheelZoom();
}

function redrawNoteStrokes() {
  if (!noteCtx) return;
  noteCtx.clearRect(0, 0, noteCanvas.width, noteCanvas.height);
  drawNoteFormatLines();
  for (const stroke of noteStrokes) {
    if (stroke.length < 2) continue;
    noteCtx.beginPath();
    noteCtx.strokeStyle = stroke[0].color; noteCtx.lineWidth = stroke[0].lineWidth;
    noteCtx.lineCap = 'round'; noteCtx.lineJoin = 'round';
    noteCtx.globalCompositeOperation = stroke[0].tool === 'eraser' ? 'destination-out' : 'source-over';
    noteCtx.moveTo(stroke[0].x, stroke[0].y);
    for (let i = 1; i < stroke.length; i++) noteCtx.lineTo(stroke[i].x, stroke[i].y);
    noteCtx.stroke();
  }
  noteCtx.globalCompositeOperation = 'source-over';
}

function noteStart(e) {
  e.preventDefault(); e.stopPropagation();
  isDrawing = true;
  const rect = noteCanvas.getBoundingClientRect();
  const sx = noteCanvas.width / rect.width;
  const sy = noteCanvas.height / rect.height;
  currentStroke = [{ x:(e.clientX-rect.left)*sx, y:(e.clientY-rect.top)*sy, color:noteTool==='eraser'?'rgba(0,0,0,1)':noteColor, lineWidth:noteTool==='marker'?noteLineWidth*2.5:noteLineWidth, tool:noteTool }];
}

function noteMove(e) {
  if (!isDrawing || !noteCtx) return;
  e.preventDefault();
  const rect = noteCanvas.getBoundingClientRect();
  const sx = noteCanvas.width / rect.width;
  const sy = noteCanvas.height / rect.height;
  const pt = { x:(e.clientX-rect.left)*sx, y:(e.clientY-rect.top)*sy, color:noteTool==='eraser'?'rgba(0,0,0,1)':noteColor, lineWidth:noteTool==='marker'?noteLineWidth*2.5:noteLineWidth, tool:noteTool };
  currentStroke.push(pt);
  const prev = currentStroke[currentStroke.length-2];
  noteCtx.beginPath(); noteCtx.strokeStyle = pt.color; noteCtx.lineWidth = pt.lineWidth;
  noteCtx.lineCap = 'round'; noteCtx.lineJoin = 'round';
  noteCtx.globalCompositeOperation = noteTool==='eraser'?'destination-out':'source-over';
  noteCtx.moveTo(prev.x, prev.y); noteCtx.lineTo(pt.x, pt.y);
  noteCtx.stroke(); noteCtx.globalCompositeOperation = 'source-over';
}

function noteEnd() {
  if (!isDrawing) return; isDrawing = false;
  if (currentStroke.length > 0) noteStrokes.push(currentStroke);
  currentStroke = [];
  if (noteCanvas) savedNoteImages[currentNotePage] = noteCanvas.toDataURL();
}

window.setNoteColor = function(c, el) { noteColor = c; document.querySelectorAll('.note-color-dot').forEach(d => d.classList.remove('active')); if (el) el.classList.add('active'); };
window.setNoteTool = function(t, el) { noteTool = t; document.querySelectorAll('.note-tool-btn').forEach(b => b.classList.remove('active')); if (el) el.classList.add('active'); };
window.clearNoteCanvas = function() { if (!noteCtx||!noteCanvas) return; noteCtx.clearRect(0,0,noteCanvas.width,noteCanvas.height); noteStrokes=[]; delete savedNoteImages[currentNotePage]; drawNoteFormatLines(); };

function drawNoteFormatLines() {
  if (!noteCtx || !noteCanvas) return;
  if (noteFormat === 'blank') return;
  const spacing = noteFormat === 'compact-lined' ? 24 : 38;
  noteCtx.save();
  noteCtx.strokeStyle = '#d0d7de';
  noteCtx.lineWidth = 0.5;
  for (let y = spacing; y < noteCanvas.height; y += spacing) {
    noteCtx.beginPath();
    noteCtx.moveTo(0, y);
    noteCtx.lineTo(noteCanvas.width, y);
    noteCtx.stroke();
  }
  noteCtx.restore();
}

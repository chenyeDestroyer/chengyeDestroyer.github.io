  const rect = e.currentTarget.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  const box = document.getElementById('smartSelectBox');
  smartSelX = Math.min(smartSelStartX, cx);
  smartSelY = Math.min(smartSelStartY, cy);
  smartSelW = Math.abs(cx - smartSelStartX);
  smartSelH = Math.abs(cy - smartSelStartY);
  box.style.left = smartSelX + 'px';
  box.style.top = smartSelY + 'px';
  box.style.width = smartSelW + 'px';
  box.style.height = smartSelH + 'px';
}

function onSmartSelEnd(e) {
  if (!smartSelecting) return;
  smartSelecting = false;
  if (smartSelW < 10 || smartSelH < 10) return;
  // Auto-confirm on mouse up with valid selection
  confirmSmartSummary();
}

function onSmartKey(e) {
  if (e.key === 'Enter' && smartSelW > 10 && smartSelH > 10) {
    confirmSmartSummary();
  } else if (e.key === 'Escape') {
    cancelSmartSummary();
  }
}

function cancelSmartSummary() {
  const overlay = document.getElementById('smartSummaryOverlay');
  overlay.classList.add('hidden');
  overlay.onmousedown = null;
  overlay.onmousemove = null;
  overlay.onmouseup = null;
  overlay.onkeydown = null;
  smartSelecting = false;
}

async function confirmSmartSummary() {
  const overlay = document.getElementById('smartSummaryOverlay');
  const loading = document.getElementById('smartSummaryLoading');
  const status = document.getElementById('smartSummaryStatus');
  loading.classList.remove('hidden');
  overlay.onmousedown = null;
  overlay.onmousemove = null;
  overlay.onmouseup = null;
  document.getElementById('smartSelectBox').style.display = 'none';

  try {
    // Capture the selected area from the viewer
    status.textContent = '正在截取区域...';
    const viewerContent = document.getElementById('viewerContent');
    const vcRect = viewerContent.getBoundingClientRect();
    
    // Use html2canvas-like approach: get the page canvas
    const pageCanvas = document.getElementById('pageCanvas');
    const penCanvas = document.getElementById('penCanvas');
    let imageData = null;
    
    if (pageCanvas) {
      // Create a composite canvas
      const compCanvas = document.createElement('canvas');
      compCanvas.width = pageCanvas.width;
      compCanvas.height = pageCanvas.height;
      const ctx = compCanvas.getContext('2d');
      ctx.drawImage(pageCanvas, 0, 0);
      if (penCanvas) ctx.drawImage(penCanvas, 0, 0);
      
      // Calculate the selection relative to page canvas
      const pageRect = pageCanvas.getBoundingClientRect();
      const scaleX = pageCanvas.width / pageRect.width;
      const scaleY = pageCanvas.height / pageRect.height;
      const sx = Math.max(0, (smartSelX - pageRect.left + overlay.getBoundingClientRect().left) * scaleX);
      const sy = Math.max(0, (smartSelY - pageRect.top + overlay.getBoundingClientRect().top) * scaleY);
      const sw = Math.min(pageCanvas.width - sx, smartSelW * scaleX);
      const sh = Math.min(pageCanvas.height - sy, smartSelH * scaleY);
      
      if (sw > 0 && sh > 0) {
        const cropCanvas = document.createElement('canvas');
        cropCanvas.width = sw;
        cropCanvas.height = sh;
        cropCanvas.getContext('2d').drawImage(compCanvas, sx, sy, sw, sh, 0, 0, sw, sh);
        imageData = cropCanvas.toDataURL('image/png');
      }
    }
    
    if (!imageData) {
      // Fallback: try to capture the docx page div
      const docxPage = document.querySelector('.docx-page');
      if (docxPage) {
        // For docx, use a simpler approach - just get the visible text
        imageData = null;
      }
    }

    if (imageData) {
      // OCR with Tesseract
      status.textContent = '正在进行OCR识别...';
      const { data: { text } } = await Tesseract.recognize(imageData, 'chi_sim+eng', {
        logger: m => {
          if (m.status === 'recognizing text') {
            status.textContent = 'OCR识别中... ' + Math.round(m.progress * 100) + '%';
          }
        }
      });
      
      const ocrText = text.trim();
      if (!ocrText) {
        status.textContent = '未识别到文字';
        setTimeout(cancelSmartSummary, 1500);
        return;
      }
      
      // AI Summary with DeepSeek
      status.textContent = '正在AI总结...';
      const summary = await callDeepSeek(ocrText);
      
      // Create a note with the summary
      addSmartSummaryNote(ocrText, summary, imageData);
    } else {
      status.textContent = '无法截取区域内容，请重试';
      setTimeout(cancelSmartSummary, 1500);
    }
  } catch(e) {
    console.error('Smart summary error:', e);
    status.textContent = '错误: ' + e.message;
    setTimeout(cancelSmartSummary, 2000);
  }
}

async function callDeepSeek(text) {
  const prompt = '请用简洁的中文总结以下内容，提取关键要点，使用要点列表格式，控制在200字以内：\n\n' + text.substring(0, 3000);
  const resp = await fetch('https://api.deepseek.com/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + DEEPSEEK_KEY },
    body: JSON.stringify({
      model: 'deepseek-chat',
      messages: [{ role: 'user', content: prompt }],
      max_tokens: 500,
      temperature: 0.3
    })
  });
  if (!resp.ok) throw new Error('AI API error: ' + resp.status);
  const data = await resp.json();
  return data.choices[0].message.content;
}

function addSmartSummaryNote(ocrText, summary, imageData) {
  const mat = currentViewerMaterial;
  if (!mat) return;
  if (!mat.notes) mat.notes = {};
  const key = String(viewerCurrentPage);
  if (!mat.notes[key]) mat.notes[key] = [];
  
  const noteId = 'n_' + Date.now() + '_' + Math.random().toString(36).substr(2,4);
  mat.notes[key].push({
    id: noteId,
    title: '智能总结 - 第' + viewerCurrentPage + '页',
    type: 'imported',
    data: imageData,
    fileType: 'png',
    strokes: [],
    createdAt: Date.now(),
    ocrText: ocrText,
    aiSummary: summary
  });
  saveMaterials();
  
  // Close overlay, refresh and open the note
  cancelSmartSummary();
  
  // Open the note panel with this new note
  currentNoteId = noteId;
  currentNotePage = viewerCurrentPage;
  notePanelOpen = true;
  openNotePanel(viewerCurrentPage);
  refreshNotePanel();
  
  // Switch to import mode to show the content
  noteMode = 'import';
  renderNoteContent(viewerCurrentPage);
  
  showToast('智能总结已生成');
}

window.saveNoteToMaterial = function() {
  const mat = currentViewerMaterial; if (!mat) return;
  if (!mat.notes) mat.notes = {};
  if (!currentNoteId) { showToast('No note selected'); return; }
  const key = String(currentNotePage);
  let pageNotes = mat.notes[key] || [];
  const idx = pageNotes.findIndex(n => n.id === currentNoteId);
  if (idx === -1) return;

  if (noteMode === 'handwrite') {
    if (noteStrokes.length > 0) {
      pageNotes[idx].strokes = JSON.parse(JSON.stringify(noteStrokes));
      pageNotes[idx].type = 'handwriting';
    }
  }
  mat.notes[key] = pageNotes;
  saveMaterials();
  refreshNotePanel();
  showToast('Note saved');
};

window.handleNoteFileImport = function(event) {
  const file = event.target.files[0]; if (!file) return;
  if (!currentNoteId) { showToast('No note selected'); return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    const mat = currentViewerMaterial; if (!mat) return;
    if (!mat.notes) mat.notes = {};
    const key = String(currentNotePage);
    let pageNotes = mat.notes[key] || [];
    const idx = pageNotes.findIndex(n => n.id === currentNoteId);
    if (idx === -1) return;
    pageNotes[idx].type = 'imported';
    pageNotes[idx].data = e.target.result;
    pageNotes[idx].fileType = file.name.endsWith('.pdf') ? 'pdf' : 'png';
    pageNotes[idx].strokes = [];
    mat.notes[key] = pageNotes;
    saveMaterials();
    refreshNotePanel();
    renderNoteContent(currentNotePage);
    showToast('File imported to note');
  };
  reader.readAsDataURL(file); event.target.value = '';
};

/* ========== Settings ========== */
window.toggleSettings = function() { document.getElementById('settingsOverlay').classList.toggle('hidden'); };

window.updateFontSize = function(val) {
  document.documentElement.style.setProperty('--font-size-base', val + 'px');
  document.documentElement.style.setProperty('--font-size-sm', (parseInt(val)-2) + 'px');
  document.documentElement.style.setProperty('--font-size-lg', (parseInt(val)+2) + 'px');
  document.documentElement.style.setProperty('--font-size-xl', (parseInt(val)+6) + 'px');
  document.documentElement.style.setProperty('--font-size-xxl', (parseInt(val)+12) + 'px');
  document.getElementById('fontSizeLabel').textContent = val + 'px';
  saveSettings({ fontSize:val, theme:document.body.getAttribute('data-theme'), mode:document.body.getAttribute('data-mode') });
};

window.setTheme = function(theme) {
  document.body.setAttribute('data-theme', theme);
  document.querySelectorAll('.theme-pick').forEach(o => o.classList.remove('active'));
  const el = document.querySelector('.theme-pick[data-theme="' + theme + '"]');
  if (el) el.classList.add('active');
  saveSettings({ fontSize:parseInt(getComputedStyle(document.documentElement).getPropertyValue('--font-size-base')), theme:theme, mode:document.body.getAttribute('data-mode') });
};

window.goHome = function() {
  if (isFullscreen) exitFullscreen();
  if (currentViewerMaterial) closeViewer();
  if (notesViewOpen) closeNotesManagement();
  document.getElementById('mainView').classList.remove('hidden');
  document.getElementById('trashView').classList.add('hidden');
  document.getElementById('notesMgmtView').classList.add('hidden');
  document.querySelector('.topbar-title').textContent = 'Rhein Lab';
  renderAll();
};

window.toggleMode = function() {
  const cur = document.body.getAttribute('data-mode');
  const nm = cur === 'dark' ? 'light' : 'dark';
  document.body.setAttribute('data-mode', nm);
  const t = document.getElementById('modeToggle');
  const l = t.querySelector('.toggle-label');
  if (nm === 'dark') { t.classList.add('active'); l.textContent = '夜间模式'; }
  else { t.classList.remove('active'); l.textContent = '日间模式'; }
  saveSettings({ fontSize:parseInt(getComputedStyle(document.documentElement).getPropertyValue('--font-size-base')), theme:document.body.getAttribute('data-theme'), mode:nm });
};

/* ========== Init ========== */
function init() {
  loadMaterials(); loadTrash(); renderAll();

  const settings = loadSettings();
  if (settings.theme) {
    document.body.setAttribute('data-theme', settings.theme);
    document.querySelectorAll('.theme-pick').forEach(o => o.classList.remove('active'));
    const ae = document.querySelector('.theme-pick[data-theme="' + settings.theme + '"]');
    if (ae) ae.classList.add('active');
  }
  if (settings.mode === 'dark') {
    document.body.setAttribute('data-mode', 'dark');
    const t = document.getElementById('modeToggle');
    t.classList.add('active'); t.querySelector('.toggle-label').textContent = '夜间模式';
  }
  if (settings.fontSize) {
    document.getElementById('fontSizeSlider').value = settings.fontSize;
    updateFontSize(settings.fontSize);
  }

  document.getElementById('settingsOverlay').onclick = function(e) { if (e.target === this) toggleSettings(); };
  document.getElementById('viewerOverlay').onclick = function(e) { if (e.target === this) closeViewer(); };
  document.getElementById('confirmOverlay').onclick = function(e) { if (e.target === this) closeConfirm(); };

  document.addEventListener('keydown', function(e) {
    if (!currentViewerMaterial) return;
    if (e.key === 'Escape') {
      if (document.getElementById('settingsOverlay').classList.contains('hidden') &&
          document.getElementById('confirmOverlay').classList.contains('hidden')) closeViewer();
    }
    if (e.key === 'ArrowLeft' && !e.target.closest('input')) viewerPrevPage();
    if (e.key === 'ArrowRight' && !e.target.closest('input')) viewerNextPage();
    if (e.key === 'f' && e.ctrlKey) { e.preventDefault(); toggleFullscreen(); }
  });

  // Close plus menu on outside click
  

  console.log('Rhein Lab v3 ready. Materials:', materials.length, 'Trash:', trash.length);
}
